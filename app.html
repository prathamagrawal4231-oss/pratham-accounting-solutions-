<script>
if(!localStorage.getItem("loggedIn")){
  window.location.href = "index.html";
}
</script>
<!DOCTYPE html>
<html>
<head>
<title>Accounting Pro Login</title>

<style>
body {
  font-family: Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  width:300px;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

.toggle {
  text-align:center;
  margin-top:10px;
  cursor:pointer;
  color:blue;
}
</style>
</head>

<body>

<div class="box" id="authBox">

<h2 id="title">Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="submit()">Continue</button>

<div class="toggle" onclick="toggleMode()">Switch to Signup</div>

</div>

<script>

let mode = "login";

// TOGGLE LOGIN/SIGNUP
function toggleMode(){
  mode = mode === "login" ? "signup" : "login";
  document.getElementById("title").innerText = mode === "login" ? "Login" : "Signup";
}

// SUBMIT
function submit(){

  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if(!email || !pass){
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users") || "{}");

  if(mode === "signup"){
    if(users[email]){
      alert("User exists");
      return;
    }
    users[email] = pass;
    localStorage.setItem("users", JSON.stringify(users));
    alert("Signup success! Now login.");
  }

  else {
    if(users[email] !== pass){
      alert("Invalid login");
      return;
    }

    localStorage.setItem("loggedIn", email);

    // REDIRECT
    window.location.href = "app.html";
  }
}

</script>

</body>
</html>
