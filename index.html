<!DOCTYPE html>
<html>
<head>
<title>Tally SaaS Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{display:flex;height:100vh;background:#0f172a}

.auth{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#0f172a;color:white;
}

.box{background:#111c33;padding:20px;border-radius:10px}

input,button{padding:8px;margin:5px}

.sidebar{
width:260px;background:#020617;color:white;padding:15px
}

.sidebar button{
width:100%;margin:5px 0;padding:10px;
background:#0f172a;color:white;border:none;border-radius:6px;
}

.main{flex:1;background:#f1f5f9;padding:20px;overflow:auto}

.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}

.row{display:grid;grid-template-columns:1fr 120px 1fr 120px;gap:10px;margin:5px 0}

table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#1e3a8a;color:white}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution",
storageBucket:"pratham-accounting-solution.firebasestorage.app",
messagingSenderId:"261436280247",
appId:"1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let user=null,company=null;

/* AUTH FIX */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
document.getElementById("authBox").style.display="none";
document.getElementById("companyBox").style.display="flex";
loadCompanies();
}
});

/* LOGIN */
function login(){
let e=email.value;
let p=password.value;

auth.signInWithEmailAndPassword(e,p)
.catch(()=>auth.createUserWithEmailAndPassword(e,p));
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div>
${d.data().name}
<button onclick="openCompany('${d.id}','${d.data().name}')">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({
name:newCompany.value,
user:user
});
newCompany.value="";
loadCompanies();
}

function openCompany(id,name){
company=name;
companyBox.style.display="none";
app.style.display="flex";
companyName.innerText=name;
loadData();
}

/* JOURNAL */
function addRow(){
let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input class="da">
<input class="dv" type="number">
<input class="ca">
<input class="cv" type="number">
`;

rows.appendChild(div);
}

/* SAVE ENTRY */
function saveEntry(){
let list=[];
let dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let da=r.querySelector(".da").value;
let dv=+r.querySelector(".dv").value||0;
let ca=r.querySelector(".ca").value;
let cv=+r.querySelector(".cv").value||0;

if(dv){list.push({acc:da,type:"dr",amt:dv});dr+=dv;}
if(cv){list.push({acc:ca,type:"cr",amt:cv});cr+=cv;}
});

if(Math.abs(dr-cr)>0.01){
alert("Not Balanced");
return;
}

db.collection("entries").add({
user:user,
company:company,
lines:list,
date:new Date().toLocaleDateString()
});

rows.innerHTML="";
loadData();
}

/* LOAD DATA + ACCOUNTING ENGINE */
function loadData(){
db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get()
.then(s=>{
ledger.innerHTML="";

let accounts={};
let income=0,expense=0,asset=0,liab=0;

s.forEach(d=>{
d.data().lines.forEach(l=>{

if(!accounts[l.acc]) accounts[l.acc]={dr:0,cr:0};
if(l.type==="dr") accounts[l.acc].dr+=l.amt;
if(l.type==="cr") accounts[l.acc].cr+=l.amt;

ledger.innerHTML+=`
<tr>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;

/* SIMPLE CLASSIFICATION */
if(l.type==="cr") income+=l.amt;
if(l.type==="dr") expense+=l.amt;

});
});

/* DASHBOARD */
dash.innerHTML=`
Income: ₹${income}<br>
Expense: ₹${expense}<br>
Profit: ₹${income-expense}
`;

/* TRIAL BALANCE */
trial.innerHTML="<h3>Trial Balance</h3><table><tr><th>Acc</th><th>Dr</th><th>Cr</th></tr>";

for(let a in accounts){
trial.innerHTML+=`
<tr><td>${a}</td><td>${accounts[a].dr}</td><td>${accounts[a].cr}</td></tr>`;
}
trial.innerHTML+="</table>";

/* P&L */
pl.innerHTML=`<h3>P&L</h3>Profit = ₹${income-expense}`;

/* BALANCE SHEET (simple model) */
bs.innerHTML=`<h3>Balance Sheet</h3>
Assets ≈ ₹${income}<br>
Liabilities ≈ ₹${expense}`;
});
}

</script>
</head>

<body>

<!-- AUTH -->
<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="box">
<h2>Companies</h2>
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
<h3 id="companyName"></h3>
<button onclick="addRow()">Add</button>
<button onclick="saveEntry()">Save</button>
</div>

<div class="main">

<div class="card">
<h2>Dashboard</h2>
<div id="dash"></div>
</div>

<div class="card">
<h2>Journal</h2>
<div id="rows"></div>

<table>
<tr><th>Acc</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>

<div class="card" id="trial"></div>
<div class="card" id="pl"></div>
<div class="card" id="bs"></div>

</div>
</div>

</body>
</html>
