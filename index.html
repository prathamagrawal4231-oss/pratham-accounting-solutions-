<!DOCTYPE html>
<html>
<head>
<title>Accounting Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#f1f5f9}

/* AUTH */
.auth{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  margin:5px 0;
  width:100%;
  cursor:pointer;
}

/* APP */
.app{
  display:none;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#0f172a;
  color:white;
  padding:20px;
}

.sidebar button{
  background:#1e293b;
  color:white;
  border:none;
}

.main{
  flex:1;
  padding:20px;
}

.flex{display:flex}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
}

th,td{padding:10px;border:1px solid #ccc}
</style>
</head>

<body>

<!-- LOGIN / SIGNUP -->
<div class="auth" id="authBox">
  <div class="box">
    <h2 id="title">Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="submitForm()">Continue</button>
    <p onclick="toggleMode()" style="cursor:pointer;color:blue;text-align:center;">
      Switch to Signup
    </p>
  </div>
</div>

<!-- APP -->
<div class="app flex" id="app">

<div class="sidebar">
  <h3>Menu</h3>
  <button onclick="showPage('journal')">Journal</button>
  <button onclick="showPage('trial')">Trial</button>
  <button onclick="showPage('pl')">P&L</button>
  <button onclick="showPage('bs')">Balance Sheet</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="journalPage">
  <h2>Journal</h2>
  <div id="lines"></div>
  <button onclick="addLine()">+ Add Line</button>
  <button onclick="saveEntry()">Save</button>

  <table>
    <tr><th>Date</th><th>Account</th><th>Dr</th><th>Cr</th></tr>
    <tbody id="ledger"></tbody>
  </table>
</div>

<div id="trialPage" style="display:none"></div>
<div id="plPage" style="display:none"></div>
<div id="bsPage" style="display:none"></div>

</div>
</div>

<script>

// ===== AUTH SYSTEM =====
let mode = "login";

function toggleMode(){
  mode = mode === "login" ? "signup" : "login";
  document.getElementById("title").innerText = mode === "login" ? "Login" : "Signup";
}

// FIXED SUBMIT FUNCTION
function submitForm(){

  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("password").value.trim();

  if(!email || !pass){
    alert("Please fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users") || "{}");

  if(mode === "signup"){

    if(users[email]){
      alert("User already exists");
      return;
    }

    users[email] = pass;
    localStorage.setItem("users", JSON.stringify(users));

    alert("Signup successful! Now login.");
    toggleMode();

  } else {

    if(users[email] !== pass){
      alert("Invalid email or password");
      return;
    }

    localStorage.setItem("logged", email);
    showApp();
  }
}

// SHOW APP
function showApp(){
  document.getElementById("authBox").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

// AUTO LOGIN
if(localStorage.getItem("logged")){
  showApp();
}

// LOGOUT
function logout(){
  localStorage.removeItem("logged");
  location.reload();
}

// ===== ACCOUNTING =====
let accounts = ["Cash","Bank","Sales","Expense"];
let entries = [];

// NAVIGATION
function showPage(p){
  journalPage.style.display = p==="journal"?"block":"none";
  trialPage.style.display = p==="trial"?"block":"none";
  plPage.style.display = p==="pl"?"block":"none";
  bsPage.style.display = p==="bs"?"block":"none";

  if(p==="trial") renderTrial();
  if(p==="pl") renderPL();
  if(p==="bs") renderBS();
}

// ADD LINE
function addLine(){
  let div=document.createElement("div");

  let opts=accounts.map(a=>`<option>${a}</option>`).join("");

  div.innerHTML=`
    <select class="acc">${opts}</select>
    <select class="type">
      <option value="debit">Dr</option>
      <option value="credit">Cr</option>
    </select>
    <input type="number" class="amt">
    <button onclick="this.parentElement.remove()">X</button>
  `;

  lines.appendChild(div);
}

// SAVE ENTRY
function saveEntry(){
  let dr=0, cr=0, list=[];

  document.querySelectorAll("#lines div").forEach(d=>{
    let acc=d.querySelector(".acc").value;
    let type=d.querySelector(".type").value;
    let amt=parseFloat(d.querySelector(".amt").value||0);

    if(amt<=0) return;

    list.push({acc,type,amt});
    if(type==="debit") dr+=amt;
    else cr+=amt;
  });

  if(list.length<2 || Math.abs(dr-cr)>0.01){
    alert("Entry not balanced");
    return;
  }

  entries.push({
    date:new Date().toLocaleDateString(),
    lines:list
  });

  lines.innerHTML="";
  renderLedger();
}

// LEDGER
function renderLedger(){
  ledger.innerHTML="";
  entries.forEach(e=>{
    e.lines.forEach(l=>{
      let tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${e.date}</td>
        <td>${l.acc}</td>
        <td>${l.type==="debit"?l.amt:""}</td>
        <td>${l.type==="credit"?l.amt:""}</td>
      `;
      ledger.appendChild(tr);
    });
  });
}

// TRIAL
function renderTrial(){
  let b={};
  accounts.forEach(a=>b[a]={dr:0,cr:0});

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.type==="debit") b[l.acc].dr+=l.amt;
      else b[l.acc].cr+=l.amt;
    });
  });

  let html="<h2>Trial Balance</h2><table><tr><th>Account</th><th>Dr</th><th>Cr</th></tr>";

  for(let a in b){
    if(b[a].dr || b[a].cr){
      html+=`<tr><td>${a}</td><td>${b[a].dr}</td><td>${b[a].cr}</td></tr>`;
    }
  }

  html+="</table>";
  trialPage.innerHTML=html;
}

// P&L
function renderPL(){
  let inc=0, exp=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.acc==="Sales") inc+=l.amt;
      if(l.acc==="Expense") exp+=l.amt;
    });
  });

  let profit = inc - exp;

  plPage.innerHTML=`<h2>P&L</h2>
  Income: ₹${inc}<br>
  Expense: ₹${exp}<br>
  <h3>${profit>=0?"Profit":"Loss"}: ₹${profit}</h3>`;
}

// BALANCE SHEET
function renderBS(){
  let assets=0, liab=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.acc==="Cash" || l.acc==="Bank"){
        if(l.type==="debit") assets+=l.amt;
        else assets-=l.amt;
      } else {
        if(l.type==="credit") liab+=l.amt;
        else liab-=l.amt;
      }
    });
  });

  bsPage.innerHTML=`<h2>Balance Sheet</h2>
  Assets: ₹${assets}<br>
  Liabilities: ₹${liab}`;
}

</script>

</body>
</html>
