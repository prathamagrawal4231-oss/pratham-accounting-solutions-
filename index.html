<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
body{margin:0;font-family:Arial;background:#0f2a44;color:white}
.topbar{background:#0b3d91;padding:8px;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 40px)}
.sidebar{width:240px;background:#0b3d91;padding:10px}
.center{flex:1;padding:20px}

.tally-btn{background:#1d4ed8;padding:8px;margin:5px 0;cursor:pointer;border-radius:4px}
.tally-btn:hover{background:#2563eb}

.gateway{background:#102a54;padding:20px;border-radius:6px}

table{width:100%;border-collapse:collapse;margin-top:10px;background:white;color:black}
th{background:#1e3a8a;color:white}
td{padding:6px;border-bottom:1px solid #ddd}

.auth{position:fixed;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:#020617}
.login-box{background:#111827;padding:30px;border-radius:10px;width:300px}

input,select,textarea{width:100%;padding:8px;margin:5px 0}
button{padding:8px;width:100%;margin-top:5px}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
width:520px;
border-radius:10px;
}

.row{
display:grid;
grid-template-columns:1fr 100px 100px;
gap:10px;
margin:5px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="login-box">
<h2>Pratham Accounting Solution</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login / Signup</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="login-box">
<input id="newCompany" placeholder="Company Name">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<div>Pratham Accounting Solution</div>
<div id="companyTitle"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="tally-btn" onclick="showPage('dashboard')">Dashboard</div>
<div class="tally-btn" onclick="openJournal()">Journal</div>
<div class="tally-btn" onclick="showPage('pl')">P&L</div>
<div class="tally-btn" onclick="showPage('bs')">Balance Sheet</div>
<div class="tally-btn" onclick="showPage('stock')">Stock</div>

<hr>

<h4>Ledger</h4>
<input id="ledgerName" placeholder="Ledger Name">
<select id="ledgerType">
<option>Asset</option>
<option>Liability</option>
<option>Income</option>
<option>Expense</option>
</select>
<button onclick="addLedger()">Add Ledger</button>

<hr>

<h4>Stock Item</h4>
<input id="itemName" placeholder="Item Name">
<input id="itemQty" placeholder="Opening Qty">
<button onclick="addItem()">Add Item</button>
</div>

<!-- MAIN -->
<div class="center">

<div id="dashboard" class="gateway">
<h2>Entries</h2>
<table>
<tr><th>Date</th><th>Account</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>

<div id="plPage" class="gateway" style="display:none"></div>
<div id="bsPage" class="gateway" style="display:none"></div>

<div id="stockPage" class="gateway" style="display:none">
<h2>Stock Report</h2>
<table>
<tr><th>Item</th><th>Qty</th></tr>
<tbody id="stockTable"></tbody>
</table>
</div>

</div>
</div>
</div>

<!-- JOURNAL -->
<div id="journalPopup" class="popup">
<h3>Journal Entry</h3>

<div id="rows"></div>
<button onclick="addRow()">Add Line</button>

<h4>Stock (Optional)</h4>
<select id="stockItem"></select>
<input id="stockQty" placeholder="Quantity">

<div id="totals">
Dr: <span id="totalDr">0</span> | Cr: <span id="totalCr">0</span>
</div>

<textarea id="narration" placeholder="Narration"></textarea>

<button onclick="saveJournal()">Save</button>
<button onclick="cancelJournal()">Cancel</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user,company,ledgerMap={},stockMap={},plData={},bsData={};

/* AUTH */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}else{
authBox.style.display="flex";
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value));
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get().then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div>${d.data().name}
<button onclick="openCompany('${d.data().name}')">Open</button></div>`;
});
});
}

function createCompany(){
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="block";
companyTitle.innerText=name;
loadData();
}

/* LEDGER */
function addLedger(){
db.collection("ledgers").add({
name:ledgerName.value,
type:ledgerType.value,
company
});
}

/* STOCK */
function addItem(){
db.collection("items").add({
name:itemName.value,
qty:parseFloat(itemQty.value)||0,
company
});
itemName.value="";itemQty.value="";
loadData();
}

/* JOURNAL */
async function openJournal(){
journalPopup.style.display="block";
rows.innerHTML="";
addRow();

/* load stock dropdown */
let snap=await db.collection("items").where("company","==",company).get();
let list=[];
snap.forEach(d=>list.push(d.data().name));
stockItem.innerHTML=list.map(i=>`<option>${i}</option>`).join("");
}

function cancelJournal(){
journalPopup.style.display="none";
rows.innerHTML="";
narration.value="";
stockQty.value="";
}

/* ROW */
async function addRow(){
let list=[];
let snap=await db.collection("ledgers").where("company","==",company).get();
snap.forEach(d=>list.push(d.data().name));

let options=list.map(l=>`<option>${l}</option>`).join("");

let div=document.createElement("div");
div.className="row";
div.innerHTML=`
<select>${options}</select>
<input type="number" oninput="calcTotal()" placeholder="Debit">
<input type="number" oninput="calcTotal()" placeholder="Credit">`;
rows.appendChild(div);
}

function calcTotal(){
let dr=0,cr=0;
document.querySelectorAll(".row").forEach(r=>{
dr+=+r.children[1].value||0;
cr+=+r.children[2].value||0;
});
totalDr.innerText=dr;
totalCr.innerText=cr;
}

/* SAVE JOURNAL */
async function saveJournal(){

let list=[],dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let acc=r.children[0].value;
let d=+r.children[1].value||0;
let c=+r.children[2].value||0;

if(d){list.push({acc,type:"dr",amt:d});dr+=d;}
if(c){list.push({acc,type:"cr",amt:c});cr+=c;}
});

if(dr!==cr){alert("Not balanced");return;}

/* STOCK LOGIC */
let item=stockItem.value;
let qty=parseFloat(stockQty.value)||0;

if(item && qty){

let snap=await db.collection("items")
.where("company","==",company)
.where("name","==",item).get();

snap.forEach(async d=>{
let current=d.data().qty;

/* detect purchase or sales */
let isPurchase=list.some(l=>l.acc.toLowerCase().includes("purchase"));
let isSales=list.some(l=>l.acc.toLowerCase().includes("sales"));

if(isPurchase) current+=qty;
if(isSales) current-=qty;

await db.collection("items").doc(d.id).update({qty:current});
});

}

/* SAVE ENTRY */
await db.collection("entries").add({
company,
date:new Date().toLocaleDateString(),
lines:list,
narration:narration.value
});

cancelJournal();
loadData();
}

/* LOAD DATA */
async function loadData(){

ledgerMap={};
stockMap={};

let led=await db.collection("ledgers").where("company","==",company).get();
led.forEach(d=>ledgerMap[d.data().name]=d.data().type);

let items=await db.collection("items").where("company","==",company).get();
items.forEach(d=>stockMap[d.data().name]=d.data().qty);

let snap=await db.collection("entries").where("company","==",company).get();

ledger.innerHTML="";
let income=0,expense=0,asset=0,liability=0;

snap.forEach(d=>{
d.data().lines.forEach(l=>{
ledger.innerHTML+=`<tr>
<td>${d.data().date}</td>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;

let type=ledgerMap[l.acc];

if(type==="Income") income+=l.amt;
if(type==="Expense") expense+=l.amt;

if(type==="Asset"){
if(l.type==="dr") asset+=l.amt;
else asset-=l.amt;
}

if(type==="Liability"){
if(l.type==="cr") liability+=l.amt;
else liability-=l.amt;
}
});
});

/* STOCK TABLE */
stockTable.innerHTML="";
for(let k in stockMap){
stockTable.innerHTML+=`<tr><td>${k}</td><td>${stockMap[k]}</td></tr>`;
}

plData={income,expense};
bsData={asset,liability};
}

/* PAGE */
function showPage(p){

dashboard.style.display="none";
plPage.style.display="none";
bsPage.style.display="none";
stockPage.style.display="none";

if(p==="dashboard") dashboard.style.display="block";

if(p==="pl"){
plPage.style.display="block";
plPage.innerHTML=`
<table>
<tr><th>Type</th><th>Amount</th></tr>
<tr><td>Income</td><td>${plData.income}</td></tr>
<tr><td>Expense</td><td>${plData.expense}</td></tr>
<tr><td>Profit</td><td>${plData.income-plData.expense}</td></tr>
</table>`;
}

if(p==="bs"){
bsPage.style.display="block";
bsPage.innerHTML=`
<table>
<tr><th>Assets</th><th>Liabilities</th></tr>
<tr><td>${bsData.asset}</td><td>${bsData.liability}</td></tr>
</table>`;
}

if(p==="stock"){
stockPage.style.display="block";
}
}
</script>

</body>
</html>
