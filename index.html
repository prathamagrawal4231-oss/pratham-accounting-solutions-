<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
body{margin:0;font-family:Arial;background:#0f2a44;color:white}
.topbar{background:#0b3d91;padding:10px;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 40px)}
.sidebar{width:240px;background:#0b3d91;padding:10px}
.center{flex:1;padding:20px}
.btn{background:#1d4ed8;padding:8px;margin:5px 0;cursor:pointer;border-radius:4px}
.gateway{background:#102a54;padding:20px;border-radius:6px}

table{width:100%;border-collapse:collapse;margin-top:10px;background:white;color:black}
th{background:#1e3a8a;color:white}
td{padding:6px;border-bottom:1px solid #ddd}

input,select{width:100%;padding:6px;margin:4px 0}
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;color:black;padding:20px;width:520px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<div id="authBox">
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="topbar">
<div>Pratham Accounting Solution</div>
</div>

<div class="container">

<div class="sidebar">
<div class="btn" onclick="showPage('stock')">Stock</div>
<div class="btn" onclick="showPage('invoice')">Sales Invoice</div>
<div class="btn" onclick="showPage('pl')">P&L</div>
</div>

<div class="center">

<div id="stockPage" class="gateway">
<h3>Stock</h3>
<input id="itemName" placeholder="Item">
<button onclick="addItem()">Add</button>

<table>
<tr><th>Item</th><th>Qty</th><th>Value</th></tr>
<tbody id="stockTable"></tbody>
</table>
</div>

<div id="invoicePage" class="gateway" style="display:none">
<h3>Sales Invoice</h3>

<select id="invItem"></select>
<input id="invQty" placeholder="Qty">
<input id="invRate" placeholder="Selling Rate">
<input id="gst" placeholder="GST % (e.g. 18)">

<button onclick="createInvoice()">Create Invoice</button>

<div id="invoiceResult"></div>
</div>

<div id="plPage" class="gateway" style="display:none"></div>

</div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user;

/* LOGIN */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
app.style.display="block";
loadItems();
loadPL();
}else{
authBox.style.display="block";
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value));
}

/* ITEMS */
function addItem(){
db.collection("items").add({name:itemName.value,user});
itemName.value="";
loadItems();
}

async function loadItems(){
let snap=await db.collection("items").where("user","==",user).get();

invItem.innerHTML="";
snap.forEach(d=>{
invItem.innerHTML+=`<option>${d.data().name}</option>`;
});

loadStock();
}

/* FIFO STOCK */
async function loadStock(){
let snap=await db.collection("batches").where("user","==",user).get();

let map={};

snap.forEach(d=>{
let {item,qty,rate}=d.data();
if(!map[item]) map[item]={qty:0,val:0};
map[item].qty+=qty;
map[item].val+=qty*rate;
});

stockTable.innerHTML="";
for(let k in map){
stockTable.innerHTML+=`<tr><td>${k}</td><td>${map[k].qty}</td><td>${map[k].val}</td></tr>`;
}
}

/* INVOICE (FIFO + GST + PROFIT) */
async function createInvoice(){

let item=invItem.value;
let qty=parseFloat(invQty.value);
let rate=parseFloat(invRate.value);
let gstRate=parseFloat(gst.value)||0;

let saleAmount=qty*rate;
let gstAmt=saleAmount*gstRate/100;
let total=saleAmount+gstAmt;

/* FIFO COGS */
let snap=await db.collection("batches")
.where("user","==",user)
.where("item","==",item)
.orderBy("time").get();

let remaining=qty;
let cogs=0;

for(let doc of snap.docs){
let data=doc.data();

if(remaining<=0) break;

let take=Math.min(data.qty,remaining);
cogs+=take*data.rate;

if(data.qty<=remaining){
await doc.ref.delete();
}else{
await doc.ref.update({qty:data.qty-take});
}

remaining-=take;
}

/* SAVE INVOICE */
await db.collection("invoices").add({
user,item,qty,rate,gst:gstAmt,total,cogs,profit:saleAmount-cogs
});

/* P&L SAVE */
await db.collection("pl").add({
user,
sales:saleAmount,
cogs:cogs,
profit:saleAmount-cogs
});

/* SHOW */
invoiceResult.innerHTML=`
Sales: ₹${saleAmount}<br>
GST: ₹${gstAmt}<br>
COGS: ₹${cogs}<br>
Profit: ₹${saleAmount-cogs}
`;

loadStock();
loadPL();
}

/* P&L */
async function loadPL(){
let snap=await db.collection("pl").where("user","==",user).get();

let sales=0,cogs=0,profit=0;

snap.forEach(d=>{
sales+=d.data().sales;
cogs+=d.data().cogs;
profit+=d.data().profit;
});

plPage.innerHTML=`
<table>
<tr><th>Particular</th><th>Amount</th></tr>
<tr><td>Sales</td><td>${sales}</td></tr>
<tr><td>COGS</td><td>${cogs}</td></tr>
<tr><td>Profit</td><td>${profit}</td></tr>
</table>`;
}

/* PAGE */
function showPage(p){
stockPage.style.display="none";
invoicePage.style.display="none";
plPage.style.display="none";

if(p==="stock") stockPage.style.display="block";
if(p==="invoice") invoicePage.style.display="block";
if(p==="pl") plPage.style.display="block";
}
</script>

</body>
</html>
