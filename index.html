<!DOCTYPE html>
<html>
<head>
<title>Tally SaaS Ultimate ERP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, system-ui, Segoe UI;
}

body{
display:flex;
height:100vh;
background:#0a0f1c;
color:#111827;
}

/* TOP BAR (NEW ERP STYLE) */
.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#0b1220;
color:white;
display:flex;
align-items:center;
padding:0 15px;
border-bottom:1px solid #1f2937;
z-index:10;
}

.brand{
font-weight:600;
color:#38bdf8;
}

/* LEFT NAV */
.sidebar{
width:260px;
margin-top:50px;
background:#050a18;
color:white;
padding:12px;
border-right:1px solid #1f2937;
height:calc(100vh - 50px);
overflow:auto;
}

.menu-btn{
width:100%;
padding:10px;
margin:6px 0;
background:#111827;
border:1px solid #1f2937;
color:#e5e7eb;
border-radius:8px;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.menu-btn:hover{
background:#1d4ed8;
}

/* MAIN WORKSPACE */
.main{
flex:1;
margin-top:50px;
padding:18px;
background:#f4f6fb;
overflow:auto;
}

/* DASHBOARD CARDS */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:15px;
}

.card{
background:white;
padding:16px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card h3{
font-size:14px;
color:#6b7280;
margin-bottom:5px;
}

.card h1{
font-size:22px;
}

/* JOURNAL UI (ERP STYLE) */
.voucher{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 2fr 1fr;
gap:10px;
margin:6px 0;
}

input{
padding:10px;
border:1px solid #d1d5db;
border-radius:8px;
outline:none;
}

button{
padding:10px 12px;
background:#1d4ed8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
border:1px solid #e5e7eb;
padding:8px;
}

th{
background:#1e3a8a;
color:white;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution",
storageBucket:"pratham-accounting-solution.firebasestorage.app",
messagingSenderId:"261436280247",
appId:"1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let user=null;
let company=null;

/* AUTH */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}
});

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value));
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div>
${d.data().name}
<button onclick="openCompany('${d.id}','${d.data().name}')">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({
name:newCompany.value,
user:user
});
newCompany.value="";
loadCompanies();
}

function openCompany(id,name){
company=name;
companyBox.style.display="none";
app.style.display="flex";
companyTitle.innerText=name;
loadData();
}

/* JOURNAL */
function addRow(){
let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input placeholder="Dr Account">
<input type="number">
<input placeholder="Cr Account">
<input type="number">
`;

rows.appendChild(div);
}

function saveEntry(){
let list=[];
let dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let da=r.children[0].value;
let dv=+r.children[1].value||0;
let ca=r.children[2].value;
let cv=+r.children[3].value||0;

if(dv){list.push({acc:da,type:"dr",amt:dv});dr+=dv;}
if(cv){list.push({acc:ca,type:"cr",amt:cv});cr+=cv;}
});

if(dr!==cr){
alert("Not Balanced");
return;
}

db.collection("entries").add({
user:user,
company:company,
lines:list,
date:new Date().toLocaleDateString()
});

rows.innerHTML="";
loadData();
}

/* ENGINE */
function loadData(){

db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get()
.then(s=>{

ledger.innerHTML="";

let acc={};
let income=0,expense=0;

s.forEach(d=>{
d.data().lines.forEach(l=>{

if(!acc[l.acc]) acc[l.acc]={dr:0,cr:0};

if(l.type==="dr"){
acc[l.acc].dr+=l.amt;
expense+=l.amt;
}

if(l.type==="cr"){
acc[l.acc].cr+=l.amt;
income+=l.amt;
}

ledger.innerHTML+=`
<tr>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;
});
});

/* DASHBOARD */
dash.innerHTML=`
<b>Gateway of Accounts</b><br><br>
Income: ₹${income}<br>
Expense: ₹${expense}<br>
Profit: ₹${income-expense}
`;

/* TRIAL BALANCE */
trial.innerHTML="<h3>Trial Balance</h3><table><tr><th>Acc</th><th>Dr</th><th>Cr</th></tr>";

for(let a in acc){
trial.innerHTML+=`
<tr><td>${a}</td><td>${acc[a].dr}</td><td>${acc[a].cr}</td></tr>`;
}
trial.innerHTML+="</table>";

/* P&L */
pl.innerHTML=`
<h3>Profit & Loss</h3>
Profit: ₹${income-expense}`;

/* BALANCE SHEET */
bs.innerHTML=`
<h3>Balance Sheet</h3>
Assets: ₹${income}<br>
Liabilities: ₹${expense}`;
});

}

</script>
</head>

<body>

<!-- AUTH -->
<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="box">
<h2>Companies</h2>
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
<h2 id="companyTitle"></h2>
<button onclick="addRow()">Journal</button>
<button onclick="saveEntry()">Save</button>
</div>

<div class="main">

<div class="card">
<h2>Dashboard</h2>
<div id="dash"></div>
</div>

<div class="card">
<h2>Journal</h2>
<div id="rows"></div>

<table>
<tr><th>Acc</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>

<div class="card" id="trial"></div>
<div class="card" id="pl"></div>
<div class="card" id="bs"></div>

</div>
</div>

</body>
</html>
