<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
body{margin:0;font-family:Arial;background:#0f2a44;color:white}

/* TOP */
.topbar{
background:#0b3d91;
padding:8px;
display:flex;
justify-content:space-between;
}

/* LAYOUT */
.container{display:flex;height:calc(100vh - 40px)}

/* LEFT */
.sidebar{
width:220px;
background:#0b3d91;
padding:10px;
}

/* RIGHT */
.rightbar{
width:260px;
background:#0b3d91;
padding:10px;
}

/* CENTER */
.center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* BOX */
.gateway{
width:500px;
background:#102a54;
padding:20px;
border-radius:6px;
}

/* BUTTONS */
.tally-btn{
background:#1d4ed8;
padding:8px;
margin:5px 0;
cursor:pointer;
border-radius:4px;
}

.tally-btn:hover{background:#2563eb}

.gateway-option{
display:flex;
justify-content:space-between;
padding:8px;
margin:5px 0;
background:#1e3a8a;
cursor:pointer;
}

.gateway-option:hover{background:#2563eb}

/* LOGIN */
.auth{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#020617;
}

.login-box{
background:#111827;
padding:30px;
border-radius:10px;
width:300px;
}

input{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%;margin-top:5px}

/* POPUP */
.popup{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;color:black;
padding:20px;width:400px;
border-radius:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user,company;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>init())
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value).then(()=>init()));
}

function init(){
user=auth.currentUser.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div style="background:#1e293b;padding:10px;margin:5px">
${d.data().name}
<button onclick="openCompany('${d.data().name}')">Open</button>
<button onclick="deleteCompany('${d.id}')">Delete</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}

function deleteCompany(id){
db.collection("companies").doc(id).delete();
loadCompanies();
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="block";
companyTitle.innerText=name;
loadData();
}

/* JOURNAL */
function openJournal(){journalPopup.style.display="block"}

function saveJournal(){
let acc=accName.value;
let dr=+drAmt.value||0;
let cr=+crAmt.value||0;

if(dr!==cr){alert("Not Balanced");return;}

db.collection("entries").add({
user,company,
lines:[
{acc,type:"dr",amt:dr},
{acc,type:"cr",amt:cr}
]
});

journalPopup.style.display="none";
loadData();
}

/* INVOICE */
function openInvoice(){invoicePopup.style.display="block"}

function saveInvoice(){
let amount=+amt.value;
let gst=amount*0.18;
let total=amount+gst;

db.collection("invoices").add({user,company,amount,gst,total});
invoicePopup.style.display="none";
loadReports();
}

/* DATA */
function loadData(){
db.collection("entries").where("company","==",company).get()
.then(s=>{
let inc=0,exp=0;

s.forEach(d=>{
d.data().lines.forEach(l=>{
if(l.type==="cr") inc+=l.amt;
if(l.type==="dr") exp+=l.amt;
});
});

pl.innerText="₹"+(inc-exp);
bs.innerText="Assets ₹"+inc+" | Liabilities ₹"+exp;
});
}

/* GST */
function loadReports(){
db.collection("invoices").where("company","==",company).get()
.then(s=>{
let total=0;
s.forEach(d=>total+=d.data().gst);
gst.innerText="GST Collected ₹"+total;
});
}

/* KEYBOARD */
document.addEventListener("keydown",e=>{
if(e.key==="F2") openJournal();
if(e.key==="F3") openInvoice();
if(e.key==="F4") loadReports();
});
</script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="login-box">
<h2>Pratham Accounting Solution</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="login-box">
<input id="newCompany" placeholder="Company">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<div>Pratham Accounting Solution</div>
<div id="companyTitle"></div>
</div>

<div class="container">

<!-- LEFT -->
<div class="sidebar">
<div>Masters</div>
<div class="tally-btn">Create Ledger</div>

<div>Transactions</div>
<div class="tally-btn" onclick="openJournal()">F2 Journal</div>
<div class="tally-btn" onclick="openInvoice()">F3 Sales</div>

<div>Reports</div>
<div class="tally-btn" onclick="loadReports()">F4 GST</div>
</div>

<!-- CENTER -->
<div class="center">
<div class="gateway">
<h2 style="text-align:center">Gateway of Pratham</h2>

<div class="gateway-option" onclick="openJournal()">
Journal Voucher <span>F2</span>
</div>

<div class="gateway-option" onclick="openInvoice()">
Sales Voucher <span>F3</span>
</div>

</div>
</div>

<!-- RIGHT -->
<div class="rightbar">
<div>P&L: <span id="pl"></span></div>
<div>Balance Sheet: <span id="bs"></span></div>
<div id="gst"></div>
</div>

</div>
</div>

<!-- POPUPS -->
<div id="journalPopup" class="popup">
<h3>Journal</h3>
<input id="accName" placeholder="Account">
<input id="drAmt" placeholder="Debit">
<input id="crAmt" placeholder="Credit">
<button onclick="saveJournal()">Save</button>
</div>

<div id="invoicePopup" class="popup">
<h3>Invoice</h3>
<input id="amt" placeholder="Amount">
<button onclick="saveInvoice()">Save</button>
</div>

</body>
</html>
