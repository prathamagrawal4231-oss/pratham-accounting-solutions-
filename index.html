<!DOCTYPE html>
<html>
<head>
<title>Mini ERP - Tally Style</title>

<style>
body{margin:0;font-family:Arial;background:#cfd8dc}

/* TOP BAR */
.topbar{
background:#0b3d91;
color:white;
padding:8px 15px;
display:flex;
justify-content:space-between;
}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh}
.container{display:flex;flex:1}

/* SIDEBAR */
.sidebar{
width:260px;
background:#e3f2fd;
border-right:2px solid #90caf9;
padding:10px;
}

.menu-title{
font-weight:bold;
margin:10px 0;
color:#0b3d91;
}

.menu-item{
padding:6px;
cursor:pointer;
}

.menu-item:hover{
background:#bbdefb;
}

/* MAIN */
.main{
flex:1;
background:white;
padding:15px;
overflow:auto;
}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{background:#0b3d91;color:white;padding:8px}
td{padding:6px;border-bottom:1px solid #ddd}

/* CARD */
.card{
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:600px;
border:2px solid #0b3d91;
padding:15px;
}

#rows div{
display:grid;
grid-template-columns:1fr 100px 1fr 100px;
gap:10px;
margin-bottom:8px;
}

/* AUTH */
.auth{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#0b1220;color:white;
}

.box{
background:#111827;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution",
storageBucket:"pratham-accounting-solution.firebasestorage.app",
messagingSenderId:"261436280247",
appId:"1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null,company=null;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value));
}

auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}
});

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div>
${d.data().name}
<button onclick="openCompany('${d.data().name}')">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="flex";
companyTitle.innerText=name;
loadData();
}

/* NAVIGATION */
function navigate(page){
dash.style.display="none";
ledgerPage.style.display="none";
reports.style.display="none";

if(page==="dash") dash.style.display="block";
if(page==="ledgerPage") loadLedgerPage();
if(page==="reports") reports.style.display="block";
}

/* LEDGER */
function createLedger(){
let name=prompt("Ledger Name");
let type=prompt("Type: Asset / Liability / Income / Expense");

if(!name||!type)return;

db.collection("ledgers").add({user:user,company:company,name,type});
alert("Ledger Created");
}

async function getLedgers(){
let snap=await db.collection("ledgers")
.where("user","==",user)
.where("company","==",company)
.get();

let arr=[];
snap.forEach(d=>arr.push(d.data().name));
return arr;
}

/* LEDGER PAGE */
async function loadLedgerPage(){
ledgerPage.style.display="block";

let snap=await db.collection("ledgers")
.where("user","==",user)
.where("company","==",company)
.get();

let html="<div class='card'><h3>Ledgers</h3>";

snap.forEach(d=>{
html+=`<div onclick="openLedger('${d.data().name}')" style="cursor:pointer">${d.data().name}</div>`;
});

html+="</div>";
ledgerPage.innerHTML=html;
}

/* DRILL */
async function openLedger(name){
let snap=await db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get();

let html=`<div class="card"><h3>${name}</h3>`;

snap.forEach(d=>{
d.data().lines.forEach(l=>{
if(l.acc===name){
html+=`<div>₹${l.amt} (${l.type})</div>`;
}
});
});

html+="</div>";
ledgerPage.innerHTML=html;
}

/* JOURNAL */
function openJournal(){
popup.style.display="block";
rows.innerHTML="";
addRow();
}

function closePopup(){popup.style.display="none"}

async function addRow(){
let ledgers=await getLedgers();
let options=ledgers.map(l=>`<option>${l}</option>`).join("");

let div=document.createElement("div");
div.innerHTML=`
<select>${options}</select>
<input type="number">
<select>${options}</select>
<input type="number">
`;

rows.appendChild(div);
}

function saveEntry(){
let list=[],dr=0,cr=0;

rows.querySelectorAll("div").forEach(r=>{
let acc1=r.children[0].value;
let d=+r.children[1].value||0;
let acc2=r.children[2].value;
let c=+r.children[3].value||0;

if(d){list.push({acc:acc1,type:"dr",amt:d});dr+=d;}
if(c){list.push({acc:acc2,type:"cr",amt:c});cr+=c;}
});

if(dr!==cr){alert("Not Balanced");return;}

db.collection("entries").add({
user:user,
company:company,
lines:list,
date:new Date().toLocaleDateString()
});

closePopup();
loadData();
}

/* LOAD DATA */
function loadData(){
db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get()
.then(s=>{

let inc=0,exp=0;
ledger.innerHTML="";

s.forEach(d=>{
d.data().lines.forEach(l=>{
if(l.type==="cr") inc+=l.amt;
if(l.type==="dr") exp+=l.amt;

ledger.innerHTML+=`
<tr>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;
});
});

dash.innerHTML=`
<div class="card">Income ₹${inc}</div>
<div class="card">Expense ₹${exp}</div>
<div class="card">Profit ₹${inc-exp}</div>
`;

pl.innerHTML=`Profit ₹${inc-exp}`;
bs.innerHTML=`Assets ₹${inc}<br>Liabilities ₹${exp}`;
});
}

/* KEYBOARD */
document.addEventListener("keydown",e=>{
if(e.key==="d"||e.key==="D") navigate('dash');
if(e.key==="l"||e.key==="L") navigate('ledgerPage');
if(e.key==="j"||e.key==="J") openJournal();
if(e.key==="r"||e.key==="R") navigate('reports');
if(e.key==="Escape") closePopup();
});
</script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Continue</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="box">
<h2>Companies</h2>
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<div>Mini ERP (Tally Style)</div>
<div id="companyTitle"></div>
</div>

<div class="container">

<div class="sidebar">
<div class="menu-title">Gateway of Tally</div>

<div class="menu-item" onclick="navigate('dash')">D: Dashboard</div>
<div class="menu-item" onclick="navigate('ledgerPage')">L: Ledgers</div>
<div class="menu-item" onclick="openJournal()">J: Journal</div>
<div class="menu-item" onclick="navigate('reports')">R: Reports</div>

<hr>

<div class="menu-title">Masters</div>
<div class="menu-item" onclick="createLedger()">Create Ledger</div>
</div>

<div class="main">

<div id="dash"></div>
<div id="ledgerPage" style="display:none"></div>

<div id="reports" style="display:none">
<div class="card"><h3>P&L</h3><div id="pl"></div></div>
<div class="card"><h3>Balance Sheet</h3><div id="bs"></div></div>
</div>

<table>
<tr><th>Account</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>

</div>

</div>
</div>

<!-- POPUP -->
<div id="popup">
<h3>Journal Voucher</h3>
<div id="rows"></div>
<button onclick="addRow()">Add Line</button>
<button onclick="saveEntry()">Save</button>
<button onclick="closePopup()">Close</button>
</div>

</body>
</html>
