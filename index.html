<!DOCTYPE html>
<html>
<head>
<title>Accounting Pro</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI; }

body { display:flex; height:100vh; background:#f1f5f9; }

/* Sidebar */
.sidebar {
  width:230px;
  background:#0f172a;
  color:white;
  padding:20px;
}

.sidebar h2 { margin-bottom:20px; }

.sidebar button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.sidebar button:hover { background:#334155; }

/* Main */
.main { flex:1; padding:25px; overflow:auto; }

/* Cards */
.cards { display:flex; gap:15px; margin-bottom:20px; }

.card {
  flex:1;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* Journal */
.box {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input, select {
  padding:10px;
  margin:5px;
  border:1px solid #ccc;
  border-radius:8px;
}

.btn {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-primary { background:#2563eb; color:white; }
.btn-danger { background:#dc2626; color:white; }

/* Table */
table {
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

th, td { padding:12px; }
th { background:#f8fafc; }
tr:nth-child(even){ background:#f9fafb; }

</style>
</head>

<body>

<div class="sidebar">
  <h2>Accounting</h2>

  <button onclick="showPage('journal')">Journal</button>
  <button onclick="showPage('trial')">Trial Balance</button>
  <button onclick="showPage('pl')">Profit & Loss</button>
  <button onclick="showPage('bs')">Balance Sheet</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div class="cards">
  <div class="card"><h3>Entries</h3><h2 id="entryCount">0</h2></div>
  <div class="card"><h3>Total Dr</h3><h2 id="totalDr">₹0</h2></div>
  <div class="card"><h3>Total Cr</h3><h2 id="totalCr">₹0</h2></div>
</div>

<!-- JOURNAL -->
<div id="journalPage" class="box">
<h2>Journal Entry</h2>

<div id="journalLines"></div>

<button class="btn btn-primary" onclick="addLine()">+ Add Line</button>
<button class="btn btn-primary" onclick="saveEntry()">Save</button>

<table>
<tr><th>Date</th><th>Account</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>

<!-- TRIAL -->
<div id="trialPage" style="display:none;">
<h2>Trial Balance</h2>
<div id="trialContent"></div>
</div>

<!-- PL -->
<div id="plPage" style="display:none;">
<h2>Profit & Loss</h2>
<div id="plContent"></div>
</div>

<!-- BS -->
<div id="bsPage" style="display:none;">
<h2>Balance Sheet</h2>
<div id="bsContent"></div>
</div>

</div>

<script>

// DATA
let accounts = ["Cash","Bank","Sales","Expense"];
let entries = [];

// NAVIGATION
function showPage(p){
  document.getElementById("journalPage").style.display = p==="journal"?"block":"none";
  document.getElementById("trialPage").style.display = p==="trial"?"block":"none";
  document.getElementById("plPage").style.display = p==="pl"?"block":"none";
  document.getElementById("bsPage").style.display = p==="bs"?"block":"none";

  if(p==="trial") renderTrial();
  if(p==="pl") renderPL();
  if(p==="bs") renderBS();
}

// ADD LINE
function addLine(){
  let div = document.createElement("div");

  let opts = accounts.map(a=>`<option>${a}</option>`).join("");

  div.innerHTML = `
    <select class="acc">${opts}</select>
    <select class="type">
      <option value="debit">Dr</option>
      <option value="credit">Cr</option>
    </select>
    <input type="number" class="amt">
    <button class="btn btn-danger" onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("journalLines").appendChild(div);
}

// SAVE ENTRY
function saveEntry(){
  let dr=0, cr=0, lines=[];

  document.querySelectorAll("#journalLines div").forEach(div=>{
    let acc = div.querySelector(".acc").value;
    let type = div.querySelector(".type").value;
    let amt = parseFloat(div.querySelector(".amt").value||0);

    if(amt<=0) return;

    lines.push({acc,type,amt});
    if(type==="debit") dr+=amt; else cr+=amt;
  });

  if(lines.length<2 || Math.abs(dr-cr)>0.01){
    alert("Entry not balanced");
    return;
  }

  entries.push({
    date:new Date().toLocaleDateString(),
    lines
  });

  document.getElementById("journalLines").innerHTML="";
  render();
}

// RENDER LEDGER + DASH
function render(){

  let ledger = document.getElementById("ledger");
  ledger.innerHTML="";

  let totalDr=0, totalCr=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{

      if(l.type==="debit") totalDr+=l.amt;
      else totalCr+=l.amt;

      let tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${e.date}</td>
        <td>${l.acc}</td>
        <td>${l.type==="debit"?l.amt:""}</td>
        <td>${l.type==="credit"?l.amt:""}</td>
      `;
      ledger.appendChild(tr);
    });
  });

  document.getElementById("entryCount").innerText = entries.length;
  document.getElementById("totalDr").innerText = "₹"+totalDr;
  document.getElementById("totalCr").innerText = "₹"+totalCr;
}

// TRIAL BALANCE
function renderTrial(){

  let balances = {};
  accounts.forEach(a=>balances[a]={dr:0,cr:0});

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.type==="debit") balances[l.acc].dr+=l.amt;
      else balances[l.acc].cr+=l.amt;
    });
  });

  let html="<table><tr><th>Account</th><th>Dr</th><th>Cr</th></tr>";

  for(let acc in balances){
    let dr=balances[acc].dr;
    let cr=balances[acc].cr;
    if(dr===0 && cr===0) continue;

    html+=`<tr><td>${acc}</td><td>${dr}</td><td>${cr}</td></tr>`;
  }

  html+="</table>";
  document.getElementById("trialContent").innerHTML=html;
}

// PROFIT LOSS
function renderPL(){

  let income=0, expense=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.acc.toLowerCase().includes("sales")) income+=l.amt;
      if(l.acc.toLowerCase().includes("expense")) expense+=l.amt;
    });
  });

  let profit=income-expense;

  document.getElementById("plContent").innerHTML=`
    <p>Income: ₹${income}</p>
    <p>Expense: ₹${expense}</p>
    <h3>${profit>=0?"Profit":"Loss"}: ₹${profit}</h3>
  `;
}

// BALANCE SHEET
function renderBS(){

  let assets=0, liabilities=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      let name=l.acc.toLowerCase();

      if(name.includes("cash")||name.includes("bank")){
        if(l.type==="debit") assets+=l.amt;
        else assets-=l.amt;
      } else {
        if(l.type==="credit") liabilities+=l.amt;
        else liabilities-=l.amt;
      }
    });
  });

  document.getElementById("bsContent").innerHTML=`
    <p>Assets: ₹${assets}</p>
    <p>Liabilities: ₹${liabilities}</p>
  `;
}

</script>

</body>
</html>
