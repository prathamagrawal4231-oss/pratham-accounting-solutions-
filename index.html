<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
body{margin:0;font-family:Arial;background:#0f2a44;color:white}
.topbar{background:#0b3d91;padding:8px;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 40px)}
.sidebar{width:220px;background:#0b3d91;padding:10px}
.center{flex:1;padding:20px}
.tally-btn{background:#1d4ed8;padding:8px;margin:5px 0;cursor:pointer;border-radius:4px}
.tally-btn:hover{background:#2563eb}
.gateway{background:#102a54;padding:20px;border-radius:6px}
table{width:100%;border-collapse:collapse;margin-top:10px;background:white;color:black}
th{background:#1e3a8a;color:white}
td{padding:6px;border-bottom:1px solid #ddd}
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;color:black;padding:20px;width:500px;border-radius:10px}
.row{display:grid;grid-template-columns:1fr 100px 100px;gap:10px;margin:5px 0}
.auth{position:fixed;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:#020617}
.login-box{background:#111827;padding:30px;border-radius:10px;width:300px}
input,select,textarea{width:100%;padding:10px;margin:5px 0}
button{padding:10px;width:100%;margin-top:5px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user,company;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>init())
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value).then(()=>init()));
}
function init(){
user=auth.currentUser.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div style="background:#1e293b;padding:10px;margin:5px">
${d.data().name}
<button onclick="openCompany('${d.data().name}')">Open</button>
<button onclick="deleteCompany('${d.id}')">Delete</button>
</div>`;
});
});
}
function createCompany(){
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}
function deleteCompany(id){
db.collection("companies").doc(id).delete();
loadCompanies();
}
function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="block";
companyTitle.innerText=name;
loadData();
}

/* LEDGER CREATION */
function addLedger(){
db.collection("ledgers").add({
name:ledgerName.value,
type:ledgerType.value,
company
});
ledgerName.value="";
}

/* JOURNAL */
function openJournal(){
journalPopup.style.display="block";
rows.innerHTML="";
addRow();
}

async function addRow(){
let list=[];
let snap=await db.collection("ledgers").where("company","==",company).get();
snap.forEach(d=>list.push(d.data().name));

let options=list.map(l=>`<option>${l}</option>`).join("");

let div=document.createElement("div");
div.className="row";
div.innerHTML=`
<select>${options}</select>
<input type="number" oninput="calcTotal()" placeholder="Debit">
<input type="number" oninput="calcTotal()" placeholder="Credit">`;
rows.appendChild(div);
}

function calcTotal(){
let dr=0,cr=0;
document.querySelectorAll(".row").forEach(r=>{
dr+=+r.children[1].value||0;
cr+=+r.children[2].value||0;
});
totalDr.innerText=dr;
totalCr.innerText=cr;
}

function saveJournal(){
let list=[],dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let acc=r.children[0].value;
let d=+r.children[1].value||0;
let c=+r.children[2].value||0;

if(d){list.push({acc,type:"dr",amt:d});dr+=d;}
if(c){list.push({acc,type:"cr",amt:c});cr+=c;}
});

if(dr!==cr){alert("Not balanced");return;}

db.collection("entries").add({
company,
date:new Date().toLocaleDateString(),
narration:narration.value,
lines:list
});

journalPopup.style.display="none";
loadData();
}

/* LOAD DATA */
async function loadData(){

let ledgerMap={};
let snapLedgers=await db.collection("ledgers").where("company","==",company).get();

snapLedgers.forEach(d=>{
ledgerMap[d.data().name]=d.data().type;
});

let snap=await db.collection("entries").where("company","==",company).get();

ledger.innerHTML="";
let income=0,expense=0,asset=0,liability=0;

snap.forEach(d=>{
d.data().lines.forEach(l=>{

ledger.innerHTML+=`
<tr>
<td>${d.data().date}</td>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
<td>${d.data().narration||""}</td>
</tr>`;

let type=ledgerMap[l.acc];

if(type==="Income") income+=l.amt;
if(type==="Expense") expense+=l.amt;

if(type==="Asset"){
if(l.type==="dr") asset+=l.amt;
else asset-=l.amt;
}

if(type==="Liability"){
if(l.type==="cr") liability+=l.amt;
else liability-=l.amt;
}

});
});

plData={income,expense};
bsData={asset,liability};

}

/* PAGE SWITCH */
function showPage(p){
dashboard.style.display="none";
plPage.style.display="none";
bsPage.style.display="none";

if(p==="dashboard") dashboard.style.display="block";
if(p==="pl"){plPage.style.display="block";renderPL();}
if(p==="bs"){bsPage.style.display="block";renderBS();}
}

/* P&L */
function renderPL(){
plDetails.innerHTML="";

for(let k in plData){
plDetails.innerHTML+=`
<div onclick="drill('${k}')">${k}: ₹ ${plData[k]}</div>`;
}

plDetails.innerHTML+=`<hr>Profit: ₹ ${plData.income - plData.expense}`;
}

/* BS */
function renderBS(){
bsDetails.innerHTML=`
<h3>Assets</h3>
₹ ${bsData.asset}
<h3>Liabilities</h3>
₹ ${bsData.liability}`;
}

/* DRILL DOWN */
async function drill(type){
let html="<h3>"+type+" Details</h3>";

let snap=await db.collection("entries").where("company","==",company).get();

snap.forEach(d=>{
d.data().lines.forEach(l=>{
html+=`${l.acc} : ₹ ${l.amt}<br>`;
});
});

plDetails.innerHTML=html;
}
</script>
</head>

<body>

<div id="authBox" class="auth">
<div class="login-box">
<input id="email"><input id="password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="companyBox" class="auth" style="display:none">
<div class="login-box">
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<div id="app" style="display:none">

<div class="topbar">
<div>Pratham Accounting Solution</div>
<div id="companyTitle"></div>
</div>

<div class="container">

<div class="sidebar">
<div class="tally-btn" onclick="showPage('dashboard')">Dashboard</div>
<div class="tally-btn" onclick="openJournal()">Journal</div>
<div class="tally-btn" onclick="showPage('pl')">P&L</div>
<div class="tally-btn" onclick="showPage('bs')">Balance Sheet</div>

<hr>
<input id="ledgerName" placeholder="Ledger Name">
<select id="ledgerType">
<option>Asset</option>
<option>Liability</option>
<option>Income</option>
<option>Expense</option>
</select>
<button onclick="addLedger()">Add Ledger</button>

</div>

<div class="center">

<div id="dashboard" class="gateway">
<h2>Gateway</h2>
<table>
<tr><th>Date</th><th>Account</th><th>Dr</th><th>Cr</th><th>Narration</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>

<div id="plPage" class="gateway" style="display:none">
<h2>P&L</h2>
<div id="plDetails"></div>
</div>

<div id="bsPage" class="gateway" style="display:none">
<h2>Balance Sheet</h2>
<div id="bsDetails"></div>
</div>

</div>

</div>
</div>

<div id="journalPopup" class="popup">
<div id="rows"></div>
<button onclick="addRow()">Add Line</button>
<div>Dr: <span id="totalDr"></span> Cr: <span id="totalCr"></span></div>
<textarea id="narration"></textarea>
<button onclick="saveJournal()">Save</button>
</div>

</body>
</html>
