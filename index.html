<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
body{margin:0;font-family:Arial;background:#cfd8dc}

/* PREMIUM LOGIN */
.auth{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#020617);
}

.login-container{text-align:center;color:white}

.brand h1{color:#38bdf8}

.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:30px;
border-radius:16px;
width:320px;
color:white;
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
}

.login-box button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
}

/* APP UI */
.topbar{background:#0b3d91;color:white;padding:8px;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 40px)}
.sidebar{width:250px;background:#e3f2fd;padding:10px}
.main{flex:1;padding:15px;background:white}

.menu-item{padding:6px;cursor:pointer}
.menu-item:hover{background:#bbdefb}

.card{border:1px solid #ccc;padding:10px;margin-bottom:10px}

table{width:100%;border-collapse:collapse}
th{background:#0b3d91;color:white}
td{padding:6px;border-bottom:1px solid #ddd}

/* POPUP */
#popup{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border:2px solid #0b3d91;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null,company=null;

/* FIXED AUTH */
auth.onAuthStateChanged(u=>{
if(u){
  user=u.uid;
} else {
  authBox.style.display="flex";
}
});

/* LOGIN BUTTON */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
  user=auth.currentUser.uid;
  authBox.style.display="none";
  companyBox.style.display="flex";
  loadCompanies();
})
.catch(()=>{
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>{
    user=auth.currentUser.uid;
    authBox.style.display="none";
    companyBox.style.display="flex";
    loadCompanies();
  });
});
}

/* COMPANIES */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div style="margin:10px 0;padding:10px;background:#1e293b;border-radius:8px;color:white;display:flex;justify-content:space-between;">
<span>${d.data().name}</span>
<button onclick="openCompany('${d.data().name}')" style="background:#2563eb;color:white;border:none;border-radius:6px;">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="block";
companyTitle.innerText=name;
loadData();
}

/* SIMPLE DATA */
function loadData(){
db.collection("entries").where("company","==",company).get()
.then(s=>{
ledger.innerHTML="";
s.forEach(d=>{
d.data().lines.forEach(l=>{
ledger.innerHTML+=`<tr><td>${l.acc}</td><td>${l.type}</td><td>${l.amt}</td></tr>`;
});
});
});
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="login-container">
<div class="brand"><h1>Pratham Accounting Solution</h1></div>
<div class="login-box">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Continue</button>
</div>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="login-box">
<input id="newCompany" placeholder="New Company">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="topbar">
<div>Pratham Accounting Solution</div>
<div id="companyTitle"></div>
</div>

<div class="container">
<div class="sidebar">
<div class="menu-item">Dashboard</div>
</div>

<div class="main">
<table>
<tr><th>Account</th><th>Type</th><th>Amount</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>
</div>
</div>

</body>
</html>
