<body>
  <h1>Pratham’s Accounting Solution</h1>
  <p>Add transactions like in Tally. GST is optional extra.</p>

  <input id="desc" placeholder="Particular (e.g. Salary)" style="width: 200px;">
  <input id="amt" type="number" placeholder="₹ Amount" style="width: 100px;">
  <input id="gst" type="number" placeholder="₹ GST (optional)" style="width: 100px;">
  <select id="type">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>
  <button onclick="addTrans()">Add Transaction</button>
  <button onclick="showBalance()">Show Balance</button>
  <button onclick="clearAll()">Clear All</button>

  <div id="balance" style="font-size: 24px; color: blue; margin-top: 20px;">
    Balance: ₹0
  </div>

  <h3>Ledger</h3>
  <table id="ledger" style="width:100%; border-collapse:collapse;">
    <thead>
      <tr>
        <th>Date</th>
        <th>Particular</th>
        <th>Type</th>
        <th>₹ Amount</th>
        <th>₹ GST</th>
      </tr>
    </thead>
    <tbody>
      <!-- Entries will be added here by JavaScript -->
    </tbody>
  </table>

  <script>
    let entries = [];   // All transactions
    let total = 0;      // Net balance (₹ Amount only)
    let totalGst = 0;   // Total of GST column (separate)

    // Load saved data from browser
    if (window.localStorage) {
      const saved = localStorage.getItem("pratham-ledger");
      if (saved) {
        try {
          entries = JSON.parse(saved);
          total = entries.reduce((sum, e) => sum + e.amt, 0);
          totalGst = entries.reduce((sum, e) => sum + e.gst, 0);
          entries.forEach(e => addRowToTable(e.date, e.desc, e.type, e.amt, e.gst));
        } catch (e) {
          console.log("Could not load saved data.");
        }
      }
    }

    function addTrans() {
      let desc = document.getElementById("desc").value;
      let amt = parseFloat(document.getElementById("amt").value);
      let gstVal = document.getElementById("gst").value;
      let gst = gstVal ? Math.abs(parseFloat(gstVal)) : 0;
      let type = document.getElementById("type").value;

      if (!desc || typeof amt !== "number" || isNaN(amt)) {
        alert("Please enter a description and amount.");
        return;
      }

      let date = new Date().toLocaleDateString("en-IN");
      let row = {
        date: date,
        desc: desc,
        type: type,
        amt: amt,
        gst: gst
      };

      entries.push(row);

      // Only ₹ Amount affects balance (GST is extra info)
      total += amt;
      totalGst += gst;

      document.getElementById("balance").innerText =
        `Balance: ₹${total.toFixed(2)} | GST (Total): ₹${totalGst.toFixed(2)}`;

      addRowToTable(date, desc, type, amt, gst);

      // Clear inputs
      document.getElementById("desc").value = "";
      document.getElementById("amt").value = "";
      document.getElementById("gst").value = "";

      // Save to browser storage
      if (window.localStorage) {
        localStorage.setItem("pratham-ledger", JSON.stringify(entries));
      }
    }

    function addRowToTable(date, desc, type, amt, gst) {
      let el = document.getElementById("ledger").querySelector("tbody");
      let row = el.insertRow();

      row.insertCell(0).innerText = date;
      row.insertCell(1).innerText = desc;
      row.insertCell(2).innerText = type === "income" ? "Income" : "Expense";
      row.insertCell(3).innerText = `₹${amt.toFixed(2)}`;

      if (gst > 0) {
        row.insertCell(4).innerText = `₹${gst.toFixed(2)}`;
      } else {
        row.insertCell(4).innerText = "";
      }
    }

    function showBalance() {
      let income = entries
        .filter(e => e.type === "income")
        .reduce((sum, e) => sum + e.amt, 0);
      let expense = entries
        .filter(e => e.type === "expense")
        .reduce((sum, e) => sum + e.amt, 0);

      let gstIn = entries
        .filter(e => e.type === "income")
        .reduce((sum, e) => sum + e.gst, 0);
      let gstOut = entries
        .filter(e => e.type === "expense")
        .reduce((sum, e) => sum + e.gst, 0);

      alert(
        "Income (₹): ₹" + income.toFixed(2) +
        "\nExpense (₹): ₹" + expense.toFixed(2) +
        "\nNet Balance (₹): ₹" + (income - expense).toFixed(2) +
        "\nGST Input (₹): ₹" + gstIn.toFixed(2) +
        "\nGST Output (₹): ₹" + gstOut.toFixed(2)
      );
    }

    function clearAll() {
      if (confirm("Are you sure you want to clear all data?")) {
        entries = [];
        total = 0;
        totalGst = 0;
        document.getElementById("balance").innerText = "Balance: ₹0 | GST (Total): ₹0";
        document.getElementById("ledger").querySelector("tbody").innerHTML = "";
        if (window.localStorage) {
          localStorage.removeItem("pratham-ledger");
        }
        alert("All data cleared.");
      }
    }
  </script>
</body>
