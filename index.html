<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
:root{
--bg:#0b1220;
--panel:#111827;
--panel-2:#1f2937;
--surface:#0f172a;
--gold:#facc15;
--gold-soft:#fde68a;
--text:#e5e7eb;
--muted:#94a3b8;
--danger:#ef4444;
--ok:#22c55e;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:radial-gradient(circle at 10% 0%, #1e293b 0%, var(--bg) 45%);
color:var(--text);
overflow:hidden;
}

/* BACKGROUND SYMBOLS */
body::before{
content:"+ − × ÷ ₹ = % + − × ÷ ₹ = % + − × ÷ ₹ = % + − × ÷ ₹ = %";
position:fixed;
width:220%;
height:220%;
top:-60%;
left:-60%;
font-size:80px;
color:rgba(250,204,21,0.08);
line-height:120px;
transform:rotate(-22deg);
pointer-events:none;
}

.auth{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:linear-gradient(180deg,var(--panel-2),var(--panel));
padding:26px;
border-radius:16px;
width:min(420px,95vw);
border:1px solid rgba(250,204,21,0.45);
box-shadow:0 20px 45px rgba(2,6,23,0.55);
backdrop-filter:blur(6px);
}

.card h2,.card h3{margin:0 0 12px}

.topbar{
background:rgba(0,0,0,0.55);
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(250,204,21,0.35);
backdrop-filter:blur(6px);
}

.topbar .brand{font-weight:700;letter-spacing:0.3px;color:var(--gold-soft)}
.topbar .company-pill{
background:rgba(250,204,21,0.15);
color:var(--gold-soft);
padding:6px 10px;
border-radius:999px;
font-size:12px;
border:1px solid rgba(250,204,21,0.4);
}

.container{display:flex;height:calc(100vh - 56px)}

.sidebar{
width:260px;
background:linear-gradient(180deg,#020617,#0b1120);
padding:14px;
border-right:1px solid rgba(250,204,21,0.25);
overflow:auto;
}

.section-label{
color:var(--muted);
font-size:12px;
text-transform:uppercase;
letter-spacing:1px;
margin:10px 0 8px;
}

.btn{
background:linear-gradient(180deg,var(--gold),#fbbf24);
color:#111827;
padding:10px 12px;
margin:6px 0;
cursor:pointer;
border-radius:10px;
font-weight:700;
text-align:center;
transition:transform .15s ease, box-shadow .15s ease;
box-shadow:0 8px 16px rgba(250,204,21,.25);
}

.btn:hover{transform:translateY(-1px);box-shadow:0 10px 18px rgba(250,204,21,.35)}
.btn:active{transform:translateY(0)}

.main{flex:1;padding:20px;overflow:auto}

.panel{
background:rgba(15,23,42,0.75);
border:1px solid rgba(148,163,184,.2);
border-radius:14px;
padding:14px;
}

table{
width:100%;
border-collapse:separate;
border-spacing:0;
background:#fff;
color:#111827;
border-radius:12px;
overflow:hidden;
box-shadow:0 14px 30px rgba(2,6,23,.14);
}
th{
background:linear-gradient(180deg,#fde047,#facc15);
color:#111827;
font-size:13px;
text-transform:uppercase;
letter-spacing:.4px;
}
th,td{padding:9px 10px;border-bottom:1px solid #e5e7eb}
tr:last-child td{border-bottom:none}

.empty{
padding:24px;
text-align:center;
color:var(--muted);
background:rgba(15,23,42,.6);
border:1px dashed rgba(148,163,184,.3);
border-radius:12px;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(4px);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.popup{
background:white;
color:#111827;
padding:20px;
width:min(620px,95vw);
max-height:85vh;
overflow:auto;
border-radius:14px;
border:2px solid var(--gold);
transform:translateY(-80px) scale(0.95);
opacity:0;
transition:all .28s ease;
}
.overlay.show{display:flex}
.overlay.show .popup{transform:translateY(0) scale(1);opacity:1}
.overlay.hide .popup{transform:translateY(-70px) scale(0.96);opacity:0}

.row{
display:grid;
grid-template-columns:1fr 120px 120px;
gap:10px;
margin:8px 0;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid rgba(148,163,184,.35);
font:inherit;
}

input,select,textarea{
background:#fff;
color:#111827;
}

button{
cursor:pointer;
background:linear-gradient(180deg,var(--gold),#fbbf24);
color:#111827;
border:none;
font-weight:700;
}

button:hover{filter:brightness(1.02)}

hr{border:none;border-top:1px solid rgba(148,163,184,.25);margin:14px 0}

@media (max-width:900px){
.container{flex-direction:column;height:calc(100vh - 56px)}
.sidebar{width:100%;border-right:none;border-bottom:1px solid rgba(250,204,21,.25)}
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="card">
<h2>Pratham Accounting Solution</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login / Signup</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="card">
<h3>Companies</h3>
<input id="newCompany" placeholder="Company Name">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<div class="brand">Pratham Accounting Solution</div>
<div id="companyName" class="company-pill">No company selected</div>
</div>

<div class="container">

<div class="sidebar">
<div class="section-label">Reports</div>
<div class="btn" onclick="showPage('ledger')">Ledger</div>
<div class="btn" onclick="openJournal()">Journal Entry</div>
<div class="btn" onclick="showPage('pl')">P&L</div>
<div class="btn" onclick="showPage('bs')">Balance Sheet</div>

<hr>
<div class="section-label">Create Ledger</div>
<input id="accName" placeholder="Ledger Name">
<select id="accType">
<option>Asset</option>
<option>Liability</option>
<option>Income</option>
<option>Expense</option>
</select>
<button onclick="addAccount()">Add Ledger</button>
</div>

<div class="main">

<div id="ledgerPage" class="panel"></div>
<div id="plPage" class="panel" style="display:none"></div>
<div id="bsPage" class="panel" style="display:none"></div>

</div>
</div>
</div>

<!-- 🔥 OVERLAY POPUP -->
<div id="overlay" class="overlay">
<div class="popup">

<h3>Journal Entry</h3>

<div id="rows"></div>
<button onclick="addRow()">Add Line</button>

<textarea id="narration" placeholder="Narration"></textarea>

<button onclick="saveEntry()">Save</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const authBox=document.getElementById("authBox");
const companyBox=document.getElementById("companyBox");
const app=document.getElementById("app");
const email=document.getElementById("email");
const password=document.getElementById("password");
const newCompany=document.getElementById("newCompany");
const companyList=document.getElementById("companyList");
const companyName=document.getElementById("companyName");
const accName=document.getElementById("accName");
const accType=document.getElementById("accType");
const overlay=document.getElementById("overlay");
const rows=document.getElementById("rows");
const narration=document.getElementById("narration");
const ledgerPage=document.getElementById("ledgerPage");
const plPage=document.getElementById("plPage");
const bsPage=document.getElementById("bsPage");

let userId="";
let activeCompanyId="";
let activeCompanyName="";
let accounts={};

function escapeHtml(str){
return String(str)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#39;");
}

function formatMoney(value){
return Number(value||0).toFixed(2);
}

/* AUTH */
auth.onAuthStateChanged(async u=>{
if(u){
userId=u.uid;
authBox.style.display="none";
app.style.display="none";
companyBox.style.display="flex";
await loadCompanies();
}else{
userId="";
activeCompanyId="";
activeCompanyName="";
authBox.style.display="flex";
companyBox.style.display="none";
app.style.display="none";
}
});

async function login(){
const userEmail=email.value.trim();
const userPassword=password.value;
if(!userEmail||!userPassword){
alert("Please enter both email and password.");
return;
}

try{
await auth.signInWithEmailAndPassword(userEmail,userPassword);
}catch(_err){
try{
await auth.createUserWithEmailAndPassword(userEmail,userPassword);
}catch(err){
alert(err.message||"Authentication failed.");
}
}
}

/* COMPANY */
async function loadCompanies(){
const snapshot=await db.collection("companies").where("user","==",userId).get();
companyList.innerHTML="";

snapshot.forEach(doc=>{
const data=doc.data();
const wrapper=document.createElement("div");
wrapper.style.cssText="background:#111827;margin:5px;padding:5px;border:1px solid #facc15";

const nameText=document.createElement("span");
nameText.textContent=data.name;

const openBtn=document.createElement("button");
openBtn.textContent="Open";
openBtn.onclick=()=>openCompany(doc.id,data.name);

const deleteBtn=document.createElement("button");
deleteBtn.textContent="Delete";
deleteBtn.onclick=()=>deleteCompany(doc.id);

wrapper.appendChild(nameText);
wrapper.appendChild(document.createElement("br"));
wrapper.appendChild(openBtn);
wrapper.appendChild(deleteBtn);
companyList.appendChild(wrapper);
});
}

async function createCompany(){
const name=newCompany.value.trim();
if(!name) return;

await db.collection("companies").add({name,user:userId});
newCompany.value="";
await loadCompanies();
}

async function deleteCompany(id){
if(!confirm("Delete this company?")) return;

await db.collection("companies").doc(id).delete();
await loadCompanies();
}

async function openCompany(id,name){
activeCompanyId=id;
activeCompanyName=name;
companyBox.style.display="none";
app.style.display="block";
companyName.innerText=name;
await loadData();
showPage("ledger");
}

/* ACCOUNT */
async function addAccount(){
if(!activeCompanyId){
alert("Open a company first.");
return;
}

const name=accName.value.trim();
if(!name){
alert("Enter ledger name.");
return;
}

await db.collection("accounts").add({
name,
type:accType.value,
companyId:activeCompanyId,
company:activeCompanyName
});
accName.value="";
await loadData();
}

/* 🔥 OPEN POPUP WITH ANIMATION */
async function openJournal(){
if(!activeCompanyId){
alert("Open a company first.");
return;
}

overlay.style.display="";
overlay.classList.remove("hide");
overlay.classList.add("show");
rows.innerHTML="";
narration.value="";
await addRow();
}

/* 🔥 CLOSE WITH ANIMATION */
function closePopup(){
overlay.classList.remove("show");
overlay.classList.add("hide");

setTimeout(()=>{
overlay.classList.remove("hide");
rows.innerHTML="";
},300);
}

/* ROW */
async function addRow(){
const list=[];
const [accountsById,accountsByName]=await Promise.all([
db.collection("accounts").where("companyId","==",activeCompanyId).get(),
db.collection("accounts").where("company","==",activeCompanyName).get()
]);

[...accountsById.docs,...accountsByName.docs].forEach(d=>list.push(d.data().name));

if(!list.length){
alert("Create at least one ledger before adding entries.");
return;
}

const uniqueList=[...new Set(list)];
const opt=uniqueList.map(l=>`<option>${escapeHtml(l)}</option>`).join("");

const div=document.createElement("div");
div.className="row";
div.innerHTML=`
<select>${opt}</select>
<input type="number" min="0" step="0.01" placeholder="Debit">
<input type="number" min="0" step="0.01" placeholder="Credit">`;

rows.appendChild(div);
}

/* SAVE */
async function saveEntry(){
const list=[];
let dr=0;
let cr=0;
let invalidRow=false;

document.querySelectorAll("#rows .row").forEach(r=>{
const acc=r.children[0].value;
const d=Number(r.children[1].value)||0;
const c=Number(r.children[2].value)||0;

if(d>0&&c>0){
invalidRow=true;
return;
}
if(d>0){
list.push({acc,type:"dr",amt:d});
dr+=d;
}
if(c>0){
list.push({acc,type:"cr",amt:c});
cr+=c;
}
});

if(invalidRow){
alert("A row cannot have both debit and credit.");
return;
}
if(!list.length){
alert("Add at least one amount.");
return;
}
if(Math.abs(dr-cr)>0.001){
alert("Not balanced");
return;
}

await db.collection("entries").add({
companyId:activeCompanyId,
company:activeCompanyName,
date:new Date().toISOString().slice(0,10),
createdAt:firebase.firestore.FieldValue.serverTimestamp(),
lines:list,
narration:narration.value.trim()
});

closePopup();
narration.value="";
await loadData();
}

/* LOAD */
async function loadData(){
accounts={};

const [accountsById,accountsByName]=await Promise.all([
db.collection("accounts").where("companyId","==",activeCompanyId).get(),
db.collection("accounts").where("company","==",activeCompanyName).get()
]);

[...accountsById.docs,...accountsByName.docs].forEach(d=>{
const data=d.data();
accounts[data.name]=data.type;
});

const [entriesById,entriesByName]=await Promise.all([
db.collection("entries").where("companyId","==",activeCompanyId).get(),
db.collection("entries").where("company","==",activeCompanyName).get()
]);

const entriesMap=new Map();
[...entriesById.docs,...entriesByName.docs].forEach(doc=>entriesMap.set(doc.id,doc.data()));
const entries=[...entriesMap.values()].sort((a,b)=>{
const aTime=a.createdAt?.toMillis?.()||Date.parse(a.date||"")||0;
const bTime=b.createdAt?.toMillis?.()||Date.parse(b.date||"")||0;
return aTime-bTime;
});

let inc=0;
let exp=0;
let asset=0;
let liab=0;

let html=`<table>
<tr><th>Date</th><th>Account</th><th>Dr</th><th>Cr</th></tr>`;

if(!entries.length){
ledgerPage.innerHTML=`<div class="empty">No journal entries yet. Click <b>Journal Entry</b> to add your first transaction.</div>`;
plPage.innerHTML=`<div class="empty">No data available for P&L.</div>`;
bsPage.innerHTML=`<div class="empty">No data available for Balance Sheet.</div>`;
return;
}

entries.forEach(entry=>{
(entry.lines||[]).forEach(l=>{
const amt=Number(l.amt)||0;
html+=`
<tr>
<td>${escapeHtml(entry.date||"")}</td>
<td>${escapeHtml(l.acc||"")}</td>
<td>${l.type==="dr"?formatMoney(amt):""}</td>
<td>${l.type==="cr"?formatMoney(amt):""}</td>
</tr>`;

const type=accounts[l.acc];

if(type==="Income"){
if(l.type==="cr") inc+=amt;
else inc-=amt;
}
if(type==="Expense"){
if(l.type==="dr") exp+=amt;
else exp-=amt;
}
if(type==="Asset"){
if(l.type==="dr") asset+=amt;
else asset-=amt;
}
if(type==="Liability"){
if(l.type==="cr") liab+=amt;
else liab-=amt;
}
});
});

html+="</table>";
ledgerPage.innerHTML=html;

plPage.innerHTML=`
<table>
<tr><th>Particular</th><th>Amount</th></tr>
<tr><td>Income</td><td>${formatMoney(inc)}</td></tr>
<tr><td>Expense</td><td>${formatMoney(exp)}</td></tr>
<tr><td>Profit</td><td>${formatMoney(inc-exp)}</td></tr>
</table>`;

bsPage.innerHTML=`
<table>
<tr><th>Assets</th><th>Liabilities</th></tr>
<tr><td>${formatMoney(asset)}</td><td>${formatMoney(liab)}</td></tr>
</table>`;
}

/* NAV */
function showPage(p){
ledgerPage.style.display="none";
plPage.style.display="none";
bsPage.style.display="none";

if(p==="ledger") ledgerPage.style.display="block";
if(p==="pl") plPage.style.display="block";
if(p==="bs") bsPage.style.display="block";
}
</script>

</body>
</html>
