<!DOCTYPE html>
<html>
<head>
<title>Mini ERP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0b1220;color:white}

/* AUTH */
.auth{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#0b1220;
}

.box{
background:#111827;
padding:25px;
border-radius:12px;
width:320px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #333;
background:#0f172a;
color:white;
}

button{
padding:10px;
width:100%;
margin-top:6px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* APP */
#app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:250px;
background:#020617;
padding:15px;
}

.sidebar button{margin-bottom:6px}

/* MAIN */
.main{
flex:1;
background:#f1f5f9;
color:black;
padding:15px;
overflow:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ccc}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution",
storageBucket:"pratham-accounting-solution.firebasestorage.app",
messagingSenderId:"261436280247",
appId:"1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null,company=null;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value));
}

auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}
});

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div style="margin:5px 0">
${d.data().name}
<button onclick="openCompany('${d.data().name}')">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="flex";
companyTitle.innerText=name;
loadData();
}

/* LEDGER SYSTEM */
function createLedger(){
let name=prompt("Ledger Name");
let type=prompt("Type: Asset / Liability / Income / Expense");

if(!name||!type)return;

db.collection("ledgers").add({
user:user,
company:company,
name:name,
type:type
});

alert("Ledger Created");
}

/* LOAD LEDGERS */
async function getLedgers(){
let snap=await db.collection("ledgers")
.where("user","==",user)
.where("company","==",company)
.get();

let arr=[];
snap.forEach(d=>arr.push(d.data().name));
return arr;
}

/* JOURNAL */
function openJournal(){
popup.style.display="flex";
rows.innerHTML="";
addRow();
}

function closePopup(){popup.style.display="none"}

async function addRow(){
let ledgers=await getLedgers();

let options=ledgers.map(l=>`<option>${l}</option>`).join("");

let div=document.createElement("div");
div.innerHTML=`
<select>${options}</select>
<input type="number" placeholder="Debit">
<select>${options}</select>
<input type="number" placeholder="Credit">
`;

rows.appendChild(div);
}

function saveEntry(){
let list=[],dr=0,cr=0;

rows.querySelectorAll("div").forEach(r=>{
let acc1=r.children[0].value;
let d=+r.children[1].value||0;
let acc2=r.children[2].value;
let c=+r.children[3].value||0;

if(d){list.push({acc:acc1,type:"dr",amt:d});dr+=d;}
if(c){list.push({acc:acc2,type:"cr",amt:c});cr+=c;}
});

if(dr!==cr){alert("Not Balanced");return;}

db.collection("entries").add({
user:user,
company:company,
lines:list,
date:new Date().toLocaleDateString()
});

closePopup();
loadData();
}

/* LOAD DATA */
function loadData(){
db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get()
.then(s=>{

let inc=0,exp=0;
ledger.innerHTML="";

s.forEach(d=>{
d.data().lines.forEach(l=>{

if(l.type==="cr") inc+=l.amt;
if(l.type==="dr") exp+=l.amt;

ledger.innerHTML+=`
<tr>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;
});
});

dash.innerHTML=`
<div class="card">Income ₹${inc}</div>
<div class="card">Expense ₹${exp}</div>
<div class="card">Profit ₹${inc-exp}</div>
`;

});
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Continue</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="box">
<h2>Companies</h2>
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="sidebar">
<h2 id="companyTitle"></h2>
<button onclick="createLedger()">Create Ledger</button>
<button onclick="openJournal()">Journal</button>
<button onclick="loadData()">Refresh</button>
</div>

<div class="main">

<div id="dash"></div>

<table>
<tr><th>Account</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>

</div>
</div>

<!-- POPUP -->
<div id="popup">
<div class="box">
<h3>Journal Entry</h3>
<div id="rows"></div>
<button onclick="addRow()">Add Line</button>
<button onclick="saveEntry()">Save</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

</body>
</html>
