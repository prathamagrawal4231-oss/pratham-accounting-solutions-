<!DOCTYPE html>
<html>
<head>
<title>Tally Prime SaaS UI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
display:flex;
height:100vh;
background:#0b1220;
color:white;
}

/* AUTH */
.auth{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#0b1220;
}

.box{
background:#111c33;
padding:20px;
border-radius:10px;
}

/* LEFT PANEL (TALLY STYLE) */
.sidebar{
width:280px;
background:#020617;
padding:15px;
border-right:2px solid #1e293b;
}

.title{
color:#38bdf8;
font-size:18px;
margin-bottom:10px;
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
background:#0f172a;
border:none;
color:white;
text-align:left;
cursor:pointer;
border-radius:4px;
}

.menu button:hover{
background:#1e3a8a;
}

/* MAIN SCREEN */
.main{
flex:1;
background:#f1f5f9;
color:black;
padding:20px;
overflow:auto;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

/* TABLE STYLE (TALLY LOOK) */
table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#1e3a8a;
color:white;
}

/* JOURNAL GRID */
.row{
display:grid;
grid-template-columns:1fr 100px 1fr 100px;
gap:10px;
margin:5px 0;
}

input,button{
padding:8px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution",
storageBucket:"pratham-accounting-solution.firebasestorage.app",
messagingSenderId:"261436280247",
appId:"1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let user=null;
let company=null;

/* AUTH */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}
});

function login(){
let e=email.value;
let p=password.value;

auth.signInWithEmailAndPassword(e,p)
.catch(()=>auth.createUserWithEmailAndPassword(e,p));
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div>
${d.data().name}
<button onclick="openCompany('${d.id}','${d.data().name}')">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({
name:newCompany.value,
user:user
});
newCompany.value="";
loadCompanies();
}

function openCompany(id,name){
company=name;
companyBox.style.display="none";
app.style.display="flex";
companyTitle.innerText=name;
loadData();
}

/* JOURNAL */
function addRow(){
let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input class="da" placeholder="Dr">
<input class="dv" type="number">
<input class="ca" placeholder="Cr">
<input class="cv" type="number">
`;

rows.appendChild(div);
}

function saveEntry(){
let list=[];
let dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let da=r.querySelector(".da").value;
let dv=+r.querySelector(".dv").value||0;
let ca=r.querySelector(".ca").value;
let cv=+r.querySelector(".cv").value||0;

if(dv){list.push({acc:da,type:"dr",amt:dv});dr+=dv;}
if(cv){list.push({acc:ca,type:"cr",amt:cv});cr+=cv;}
});

if(Math.abs(dr-cr)>0.01){
alert("Not Balanced");
return;
}

db.collection("entries").add({
user:user,
company:company,
lines:list,
date:new Date().toLocaleDateString()
});

rows.innerHTML="";
loadData();
}

/* REPORT ENGINE (TALLY STYLE) */
function loadData(){
db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get()
.then(s=>{

ledger.innerHTML="";
let accMap={};
let income=0,expense=0;

s.forEach(d=>{
d.data().lines.forEach(l=>{

if(!accMap[l.acc]) accMap[l.acc]={dr:0,cr:0};
if(l.type==="dr") accMap[l.acc].dr+=l.amt;
if(l.type==="cr") accMap[l.acc].cr+=l.amt;

ledger.innerHTML+=`
<tr>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;

/* simple classification */
if(l.type==="cr") income+=l.amt;
if(l.type==="dr") expense+=l.amt;

});
});

/* DASH */
dash.innerHTML=`
<b>Gateway of Accounts</b><br><br>
Income: ₹${income}<br>
Expense: ₹${expense}<br>
Profit: ₹${income-expense}
`;

/* TRIAL BALANCE */
trial.innerHTML="<h3>Trial Balance</h3><table><tr><th>Account</th><th>Dr</th><th>Cr</th></tr>";

for(let a in accMap){
trial.innerHTML+=`
<tr>
<td>${a}</td>
<td>${accMap[a].dr}</td>
<td>${accMap[a].cr}</td>
</tr>`;
}

trial.innerHTML+="</table>";

/* P&L */
pl.innerHTML=`<h3>Profit & Loss</h3>Profit = ₹${income-expense}`;

/* BALANCE SHEET */
bs.innerHTML=`<h3>Balance Sheet</h3>
Assets: ₹${income}<br>
Liabilities: ₹${expense}`;
});

}

</script>
</head>

<body>

<!-- AUTH -->
<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="box">
<h2>Companies</h2>
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
<div class="title" id="companyTitle">Tally SaaS</div>

<div class="menu">
<button onclick="addRow()">➕ Journal Entry</button>
<button onclick="saveEntry()">💾 Save Entry</button>
</div>
</div>

<div class="main">

<div class="card">
<h2>Gateway of Accounts</h2>
<div id="dash"></div>
</div>

<div class="card">
<h2>Journal</h2>
<div id="rows"></div>

<table>
<tr><th>Account</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>
</div>

<div class="card" id="trial"></div>
<div class="card" id="pl"></div>
<div class="card" id="bs"></div>

</div>
</div>

</body>
</html>
