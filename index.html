<!DOCTYPE html>
<html>
<head>
<title>Accounting Cloud App</title>

<style>
body{margin:0;font-family:Arial;display:flex;height:100vh;background:#0f172a;color:#fff}

.auth{
  position:fixed;width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
  background:#0f172a;
}

.box{background:#1e293b;padding:20px;border-radius:10px}

input,select{padding:8px;margin:5px;width:200px}

button{padding:8px 12px;margin:5px;cursor:pointer}

.sidebar{
  width:220px;background:#020617;padding:15px
}

.main{flex:1;background:#f1f5f9;color:#000;padding:20px;overflow:auto}

.row{display:grid;grid-template-columns:1fr 80px 1fr 80px;gap:10px;margin:5px 0}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:8px}
th{background:#1e293b;color:#fff}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="auth" class="auth">
  <div class="box">
    <h2 id="title">Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">Continue</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
<h3>Menu</h3>
<button onclick="showJournal()">Journal</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h2>Journal Entry</h2>

<div id="rows"></div>

<button onclick="addRow()">Add Row</button>
<button onclick="save()">Save</button>

<table>
<tr><th>Account</th><th>Dr</th><th>Account</th><th>Cr</th></tr>
<tbody id="table"></tbody>
</table>

</div>
</div>

<script>

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
  authDomain: "pratham-accounting-solution.firebaseapp.com",
  projectId: "pratham-accounting-solution",
  storageBucket: "pratham-accounting-solution.firebasestorage.app",
  messagingSenderId: "261436280247",
  appId: "1:261436280247:web:5af8a0f36ff722dce62c32",
  measurementId: "G-W2Y5J3JZ1X"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

let userId="";

function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(u=>{
    userId=u.user.uid;
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="flex";
    load();
  })
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email,pass)
    .then(u=>{
      userId=u.user.uid;
      document.getElementById("auth").style.display="none";
      document.getElementById("app").style.display="flex";
      load();
    });
  });
}

function logout(){
  auth.signOut();
  location.reload();
}

/* JOURNAL */
function addRow(){
  let div=document.createElement("div");
  div.className="row";
  div.innerHTML=`
    <input placeholder="Dr Account" class="a1">
    <input type="number" class="dr">
    <input placeholder="Cr Account" class="a2">
    <input type="number" class="cr">
  `;
  rows.appendChild(div);
}

function save(){
  let lines=[];
  document.querySelectorAll(".row").forEach(r=>{
    let a1=r.querySelector(".a1").value;
    let dr=+r.querySelector(".dr").value||0;
    let a2=r.querySelector(".a2").value;
    let cr=+r.querySelector(".cr").value||0;

    if(dr)lines.push({acc:a1,type:"dr",amt:dr});
    if(cr)lines.push({acc:a2,type:"cr",amt:cr});
  });

  db.collection("entries").add({
    user:userId,
    lines:lines,
    date:new Date()
  });

  rows.innerHTML="";
  load();
}

/* LOAD */
function load(){
  table.innerHTML="";

  db.collection("entries")
  .where("user","==",userId)
  .get()
  .then(snap=>{
    snap.forEach(doc=>{
      doc.data().lines.forEach(l=>{
        table.innerHTML+=`
        <tr>
          <td>${l.type==="dr"?l.acc:""}</td>
          <td>${l.type==="dr"?l.amt:""}</td>
          <td>${l.type==="cr"?l.acc:""}</td>
          <td>${l.type==="cr"?l.amt:""}</td>
        </tr>`;
      });
    });
  });
}

</script>

</body>
</html>
