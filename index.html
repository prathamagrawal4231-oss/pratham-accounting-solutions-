<!DOCTYPE html>
<html>
<head>
<title>Tally Cloud Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  display:flex;
  height:100vh;
  background:#0f172a;
  color:white;
}

/* AUTH */
.auth{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
}

.box{
  background:#111c33;
  padding:20px;
  border-radius:10px;
}

/* COMPANY */
#companySelect{
  display:none;
}

/* APP */
.sidebar{
  width:250px;
  background:#020617;
  padding:15px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.main{
  flex:1;
  background:#f1f5f9;
  color:black;
  padding:20px;
  overflow:auto;
}

.box2{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  margin:5px;
}

/* JOURNAL */
.row{
  display:grid;
  grid-template-columns:1fr 120px 1fr 120px;
  gap:10px;
  margin:6px 0;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
}

th{
  background:#1e3a8a;
  color:white;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
  authDomain: "pratham-accounting-solution.firebaseapp.com",
  projectId: "pratham-accounting-solution",
  storageBucket: "pratham-accounting-solution.firebasestorage.app",
  messagingSenderId: "261436280247",
  appId: "1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
/* =================================================== */

let user="",company="";

/* LOGIN */
function submitAuth(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(u=>{
    user=u.user.uid;
    loadCompanies();
  })
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email,pass)
    .then(u=>{
      user=u.user.uid;
      loadCompanies();
    });
  });
}

/* LOGOUT */
function logout(){
  auth.signOut();
  location.reload();
}

/* LOAD COMPANIES */
function loadCompanies(){
  auth.onAuthStateChanged(u=>{
    if(!u)return;

    user=u.uid;

    db.collection("companies")
    .where("user","==",user)
    .get()
    .then(snap=>{
      let html="";
      snap.forEach(doc=>{
        html+=`
        <div>
          ${doc.data().name}
          <button onclick="openCompany('${doc.id}','${doc.data().name}')">Open</button>
        </div>`;
      });

      companyList.innerHTML=html;
      authBox.style.display="none";
      companySelect.style.display="flex";
    });
  });
}

/* CREATE COMPANY */
function createCompany(){
  let name=newCompany.value.trim();
  if(!name)return;

  db.collection("companies").add({
    name:name,
    user:user
  });

  newCompany.value="";
  loadCompanies();
}

/* OPEN COMPANY */
function openCompany(id,name){
  company=name;
  companySelect.style.display="none";
  app.style.display="flex";
  companyName.innerText=name;

  loadData();
}

/* JOURNAL ROW */
function addRow(){
  let div=document.createElement("div");
  div.className="row";

  div.innerHTML=`
    <input placeholder="Dr Account" class="drA">
    <input type="number" class="drV">
    <input placeholder="Cr Account" class="crA">
    <input type="number" class="crV">
  `;

  rows.appendChild(div);
}

/* SAVE ENTRY */
function saveEntry(){
  let list=[];
  let dr=0,cr=0;

  document.querySelectorAll(".row").forEach(r=>{
    let da=r.querySelector(".drA").value;
    let dv=+r.querySelector(".drV").value||0;

    let ca=r.querySelector(".crA").value;
    let cv=+r.querySelector(".crV").value||0;

    if(dv>0){list.push({acc:da,type:"debit",amt:dv});dr+=dv;}
    if(cv>0){list.push({acc:ca,type:"credit",amt:cv});cr+=cv;}
  });

  if(Math.abs(dr-cr)>0.01){
    alert("Entry not balanced!");
    return;
  }

  db.collection("entries").add({
    user:user,
    company:company,
    lines:list,
    date:new Date().toLocaleDateString()
  });

  rows.innerHTML="";
  loadData();
}

/* LOAD DATA */
function loadData(){
  db.collection("entries")
  .where("user","==",user)
  .where("company","==",company)
  .get()
  .then(snap=>{
    entries=[];
    ledger.innerHTML="";

    snap.forEach(doc=>{
      let e=doc.data();
      entries.push(e);

      e.lines.forEach(l=>{
        ledger.innerHTML+=`
        <tr>
          <td>${e.date}</td>
          <td>${l.acc}</td>
          <td>${l.type==="debit"?l.amt:""}</td>
          <td>${l.type==="credit"?l.amt:""}</td>
        </tr>`;
      });
    });

    renderDash();
  });
}

/* DASHBOARD */
function renderDash(){
  let inc=0,exp=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.type==="debit") exp+=l.amt;
      if(l.type==="credit") inc+=l.amt;
    });
  });

  dash.innerHTML=`
  Income: ₹${inc}<br>
  Expense: ₹${exp}<br>
  Profit: ₹${inc-exp}`;
}

</script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="submitAuth()">Login / Signup</button>
</div>
</div>

<!-- COMPANY -->
<div id="companySelect" class="auth">
<div class="box">
<h2>Companies</h2>

<input id="newCompany" placeholder="New Company">
<button onclick="createCompany()">Create</button>

<div id="companyList"></div>

<button onclick="logout()">Logout</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
<h3 id="companyName">Company</h3>
<button onclick="addRow()">Add Row</button>
<button onclick="saveEntry()">Save Entry</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="box2">
<h2>Dashboard</h2>
<div id="dash"></div>
</div>

<div class="box2">
<h2>Journal</h2>
<div id="rows"></div>

<table>
<tr>
<th>Date</th>
<th>Account</th>
<th>Dr</th>
<th>Cr</th>
</tr>
<tbody id="ledger"></tbody>
</table>

</div>

</div>
</div>

</body>
</html>
