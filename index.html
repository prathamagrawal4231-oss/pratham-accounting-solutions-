<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Solution</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* BACKGROUND SYMBOLS */
body::before{
content:"+  −  ×  ÷   %   ₹   =   +   −   ×";
position:fixed;
font-size:120px;
color:rgba(255,255,255,0.05);
top:20%;
left:10%;
white-space:nowrap;
transform:rotate(-20deg);
pointer-events:none;
}

/* AUTH */
.auth{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#111827;
padding:30px;
border-radius:10px;
width:320px;
}

input,select,textarea{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}

/* APP */
.topbar{
background:#1e293b;
padding:10px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
height:calc(100vh - 40px);
}

.sidebar{
width:230px;
background:#020617;
padding:10px;
}

.btn{
background:#1e3a8a;
padding:10px;
margin:5px 0;
cursor:pointer;
border-radius:6px;
}

.btn:hover{background:#2563eb}

.main{
flex:1;
padding:20px;
overflow:auto;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
}

th{
background:#1e293b;
color:white;
}

td{
padding:6px;
border-bottom:1px solid #ddd;
}

/* JOURNAL */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
width:500px;
border-radius:10px;
}

.row{
display:grid;
grid-template-columns:1fr 100px 100px;
gap:10px;
margin:5px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth">
<div class="card">
<h2>Pratham Accounting Solution</h2>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login / Signup</button>
</div>
</div>

<!-- COMPANY -->
<div id="companyBox" class="auth" style="display:none">
<div class="card">
<h3>Companies</h3>
<input id="newCompany" placeholder="Company Name">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topbar">
<div>Pratham Accounting Solution</div>
<div id="companyName"></div>
</div>

<div class="container">

<div class="sidebar">
<div class="btn" onclick="showPage('ledger')">Ledger</div>
<div class="btn" onclick="openJournal()">Journal</div>
<div class="btn" onclick="showPage('pl')">P&L</div>
<div class="btn" onclick="showPage('bs')">Balance Sheet</div>

<hr>

<input id="accName" placeholder="Ledger Name">
<select id="accType">
<option>Asset</option>
<option>Liability</option>
<option>Income</option>
<option>Expense</option>
</select>
<button onclick="addAccount()">Add Ledger</button>
</div>

<div class="main">

<div id="ledgerPage"></div>
<div id="plPage" style="display:none"></div>
<div id="bsPage" style="display:none"></div>

</div>
</div>
</div>

<!-- JOURNAL -->
<div id="popup" class="popup">
<h3>Journal Entry</h3>

<div id="rows"></div>
<button onclick="addRow()">Add Line</button>

<textarea id="narration" placeholder="Narration"></textarea>

<button onclick="saveEntry()">Save</button>
<button onclick="closePopup()">Cancel</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user,company,accounts={};

/* AUTH */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}else{
authBox.style.display="flex";
}
});

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(()=>auth.createUserWithEmailAndPassword(email.value,password.value));
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get().then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div style="background:#1e293b;margin:5px;padding:5px">
${d.data().name}
<button onclick="openCompany('${d.data().name}')">Open</button>
<button onclick="deleteCompany('${d.id}')">Delete</button>
</div>`;
});
});
}

function createCompany(){
if(!newCompany.value)return;
db.collection("companies").add({name:newCompany.value,user});
newCompany.value="";
loadCompanies();
}

function deleteCompany(id){
if(confirm("Are you sure you want to delete this company?")){
db.collection("companies").doc(id).delete();
loadCompanies();
}
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="block";
companyName.innerText=name;
loadData();
}

/* ACCOUNT */
function addAccount(){
db.collection("accounts").add({
name:accName.value,
type:accType.value,
company
});
accName.value="";
}

/* JOURNAL */
function openJournal(){
popup.style.display="block";
rows.innerHTML="";
addRow();
}

function closePopup(){
popup.style.display="none";
}

async function addRow(){
let list=[];
let snap=await db.collection("accounts").where("company","==",company).get();
snap.forEach(d=>list.push(d.data().name));

let opt=list.map(l=>`<option>${l}</option>`).join("");

let div=document.createElement("div");
div.className="row";
div.innerHTML=`
<select>${opt}</select>
<input type="number" placeholder="Debit">
<input type="number" placeholder="Credit">`;

rows.appendChild(div);
}

async function saveEntry(){
let list=[],dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let acc=r.children[0].value;
let d=+r.children[1].value||0;
let c=+r.children[2].value||0;

if(d){list.push({acc,type:"dr",amt:d});dr+=d;}
if(c){list.push({acc,type:"cr",amt:c});cr+=c;}
});

if(dr!==cr){alert("Not balanced");return;}

await db.collection("entries").add({
company,
date:new Date().toLocaleDateString(),
lines:list,
narration:narration.value
});

closePopup();
loadData();
}

/* LOAD DATA */
async function loadData(){

accounts={};

let a=await db.collection("accounts").where("company","==",company).get();
a.forEach(d=>accounts[d.data().name]=d.data().type);

let e=await db.collection("entries").where("company","==",company).get();

let inc=0,exp=0,asset=0,liab=0;

let html=`<table>
<tr><th>Date</th><th>Account</th><th>Dr</th><th>Cr</th></tr>`;

e.forEach(d=>{
d.data().lines.forEach(l=>{

html+=`
<tr>
<td>${d.data().date}</td>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;

let type=accounts[l.acc];

if(type==="Income") inc+=l.amt;
if(type==="Expense") exp+=l.amt;

if(type==="Asset"){
if(l.type==="dr") asset+=l.amt;
else asset-=l.amt;
}

if(type==="Liability"){
if(l.type==="cr") liab+=l.amt;
else liab-=l.amt;
}

});
});

html+="</table>";
ledgerPage.innerHTML=html;

/* P&L */
plPage.innerHTML=`
<table>
<tr><th>Particular</th><th>Amount</th></tr>
<tr><td>Income</td><td>${inc}</td></tr>
<tr><td>Expense</td><td>${exp}</td></tr>
<tr><td>Profit</td><td>${inc-exp}</td></tr>
</table>`;

/* BS */
bsPage.innerHTML=`
<table>
<tr><th>Assets</th><th>Liabilities</th></tr>
<tr><td>${asset}</td><td>${liab}</td></tr>
</table>`;
}

/* NAV */
function showPage(p){
ledgerPage.style.display="none";
plPage.style.display="none";
bsPage.style.display="none";

if(p==="ledger") ledgerPage.style.display="block";
if(p==="pl") plPage.style.display="block";
if(p==="bs") bsPage.style.display="block";
}
</script>

</body>
</html>
