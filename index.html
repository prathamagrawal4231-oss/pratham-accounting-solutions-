<!DOCTYPE html>
<html>
<head>
<title>Tally Cloud Lite</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
  background:#0b1220;
  color:white;
}

.auth{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
}

.box{
  background:#111c33;
  padding:20px;
  border-radius:10px;
}

input{
  padding:8px;
  margin:5px;
  width:220px;
}

button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.sidebar{
  width:240px;
  background:#0a1020;
  padding:15px;
}

.menu button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#18243f;
  border:none;
  color:white;
}

.main{
  flex:1;
  background:#f4f6fb;
  color:black;
  padding:20px;
  overflow:auto;
}

.panel{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.journalRow{
  display:grid;
  grid-template-columns:1fr 120px 1fr 120px;
  gap:10px;
  margin:6px 0;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
}

th{
  background:#1e3a8a;
  color:white;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="auth" class="auth">
  <div class="box">
    <h2>Tally Cloud Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
  <h3>Menu</h3>
  <div class="menu">
    <button onclick="show('journal')">Journal</button>
    <button onclick="show('ledger')">Ledger</button>
    <button onclick="addRow()">+ Row</button>
    <button onclick="saveEntry()">Save</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">

<!-- JOURNAL -->
<div id="journalPage" class="panel">
<h2>Journal Entry</h2>
<div id="rows"></div>
</div>

<!-- LEDGER -->
<div id="ledgerPage" class="panel" style="display:none">
<h2>Ledger</h2>

<table>
<tr>
<th>Dr Account</th>
<th>Dr Amount</th>
<th>Cr Account</th>
<th>Cr Amount</th>
</tr>
<tbody id="table"></tbody>
</table>

</div>

</div>
</div>

<script>

/* ================= FIREBASE CONFIG (REPLACED) ================= */
const firebaseConfig = {
  apiKey: "AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
  authDomain: "pratham-accounting-solution.firebaseapp.com",
  projectId: "pratham-accounting-solution",
  storageBucket: "pratham-accounting-solution.firebasestorage.app",
  messagingSenderId: "261436280247",
  appId: "1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
/* ============================================================ */

let uid="";

/* LOGIN */
function login(){
  let e=document.getElementById("email").value;
  let p=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(e,p)
  .then(u=>{
    uid=u.user.uid;
    start();
  })
  .catch(()=>{
    auth.createUserWithEmailAndPassword(e,p)
    .then(u=>{
      uid=u.user.uid;
      start();
    })
    .catch(e=>alert(e.message));
  });
}

function start(){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="flex";
  load();
}

function logout(){
  auth.signOut();
  location.reload();
}

/* NAV */
function show(page){
  document.getElementById("journalPage").style.display =
    page==="journal"?"block":"none";

  document.getElementById("ledgerPage").style.display =
    page==="ledger"?"block":"none";
}

/* JOURNAL ROW */
function addRow(){
  let div=document.createElement("div");
  div.className="journalRow";

  div.innerHTML=`
    <input placeholder="Dr Account" class="drA">
    <input type="number" class="drV">
    <input placeholder="Cr Account" class="crA">
    <input type="number" class="crV">
  `;

  rows.appendChild(div);
}

/* SAVE ENTRY */
function saveEntry(){
  let lines=[];

  document.querySelectorAll(".journalRow").forEach(r=>{
    let da=r.querySelector(".drA").value;
    let dv=+r.querySelector(".drV").value||0;
    let ca=r.querySelector(".crA").value;
    let cv=+r.querySelector(".crV").value||0;

    if(dv>0)lines.push({acc:da,type:"dr",amt:dv});
    if(cv>0)lines.push({acc:ca,type:"cr",amt:cv});
  });

  let dr=lines.filter(l=>l.type==="dr").reduce((a,b)=>a+b.amt,0);
  let cr=lines.filter(l=>l.type==="cr").reduce((a,b)=>a+b.amt,0);

  if(Math.abs(dr-cr)>0.01){
    alert("Not Balanced!");
    return;
  }

  db.collection("entries").add({
    user:uid,
    lines:lines,
    date:new Date()
  });

  rows.innerHTML="";
  load();
}

/* LOAD */
function load(){
  table.innerHTML="";

  db.collection("entries")
  .where("user","==",uid)
  .get()
  .then(snap=>{
    snap.forEach(doc=>{
      doc.data().lines.forEach(l=>{
        table.innerHTML+=`
        <tr>
          <td>${l.type==="dr"?l.acc:""}</td>
          <td>${l.type==="dr"?l.amt:""}</td>
          <td>${l.type==="cr"?l.acc:""}</td>
          <td>${l.type==="cr"?l.amt:""}</td>
        </tr>`;
      });
    });
  });
}

</script>

</body>
</html>
