<!DOCTYPE html>
<html>
<head>
<title>Accounting Pro</title>
<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }
.sidebar { width:200px; background:#111; color:white; padding:15px; }
.main { flex:1; padding:20px; }
button { padding:8px; margin:5px; }
input, select { padding:6px; margin:5px; }
</style>
</head>

<body>

<div class="sidebar">
<h3>Accounts</h3>
<div id="accounts"></div>
<button id="addAcc">+ Add Account</button>
</div>

<div class="main">

<h2>Journal Entry</h2>

<div id="lines"></div>

<button id="addLineBtn">+ Add Line</button>
<button id="saveBtn">Save</button>

<h2>Ledger</h2>
<table border="1" width="100%">
<thead>
<tr>
<th>Date</th>
<th>Account</th>
<th>Dr</th>
<th>Cr</th>
</tr>
</thead>
<tbody id="ledger"></tbody>
</table>

</div>

<script>

let accounts = ["Cash","Bank","Sales"];
let entries = [];

const accDiv = document.getElementById("accounts");
const linesDiv = document.getElementById("lines");
const ledger = document.getElementById("ledger");

// render accounts
function renderAccounts(){
  accDiv.innerHTML="";
  accounts.forEach(a=>{
    let d=document.createElement("div");
    d.innerText=a;
    accDiv.appendChild(d);
  });
}

// add account
document.getElementById("addAcc").onclick = () => {
  let name = prompt("Account name");
  if(name){
    accounts.push(name);
    renderAccounts();
  }
};

// add line
document.getElementById("addLineBtn").onclick = () => {
  let div=document.createElement("div");

  let opts = accounts.map(a=>`<option>${a}</option>`).join("");

  div.innerHTML = `
    <select class="acc">${opts}</select>
    <select class="type">
      <option value="debit">Dr</option>
      <option value="credit">Cr</option>
    </select>
    <input type="number" class="amt">
    <button class="del">X</button>
  `;

  div.querySelector(".del").onclick = () => div.remove();

  linesDiv.appendChild(div);
};

// save entry
document.getElementById("saveBtn").onclick = () => {

  let dr=0, cr=0;
  let lines=[];

  document.querySelectorAll("#lines div").forEach(div=>{
    let acc = div.querySelector(".acc").value;
    let type = div.querySelector(".type").value;
    let amt = parseFloat(div.querySelector(".amt").value||0);

    if(amt<=0) return;

    lines.push({acc,type,amt});

    if(type==="debit") dr+=amt;
    else cr+=amt;
  });

  if(lines.length<2){
    alert("Add 2 lines");
    return;
  }

  if(Math.abs(dr-cr)>0.01){
    alert("Not balanced");
    return;
  }

  entries.push({
    date:new Date().toLocaleDateString(),
    lines
  });

  linesDiv.innerHTML="";
  renderLedger();
};

// ledger
function renderLedger(){
  ledger.innerHTML="";

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      let tr=document.createElement("tr");

      tr.innerHTML=`
        <td>${e.date}</td>
        <td>${l.acc}</td>
        <td>${l.type==="debit"?l.amt:""}</td>
        <td>${l.type==="credit"?l.amt:""}</td>
      `;

      ledger.appendChild(tr);
    });
  });
}

renderAccounts();

</script>

</body>
</html>
