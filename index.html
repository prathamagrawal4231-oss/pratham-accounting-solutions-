<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user,company;

/* ✅ AUTH STATE FIX (MAIN FIX) */
auth.onAuthStateChanged(u=>{
if(u){
user=u.uid;
authBox.style.display="none";
companyBox.style.display="flex";
loadCompanies();
}else{
authBox.style.display="flex";
companyBox.style.display="none";
app.style.display="none";
}
});

/* LOGIN */
function login(){
let e=email.value;
let p=password.value;

auth.signInWithEmailAndPassword(e,p)
.catch(()=>{
auth.createUserWithEmailAndPassword(e,p);
});
}

/* COMPANY */
function loadCompanies(){
db.collection("companies").where("user","==",user).get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div style="background:#1e293b;padding:10px;margin:5px">
<span style="color:white">${d.data().name}</span>
<button onclick="openCompany('${d.data().name}')">Open</button>
<button onclick="deleteCompany('${d.id}')">Delete</button>
</div>`;
});
});
}

function createCompany(){
if(!newCompany.value)return;
db.collection("companies").add({name:newCompany.value,user:user});
newCompany.value="";
loadCompanies();
}

function deleteCompany(id){
db.collection("companies").doc(id).delete();
loadCompanies();
}

function openCompany(name){
company=name;
companyBox.style.display="none";
app.style.display="block";
companyTitle.innerText=name;
loadData();
}

/* LEDGER */
function addLedger(){
db.collection("ledgers").add({
name:ledgerName.value,
type:ledgerType.value,
company
});
ledgerName.value="";
}

/* JOURNAL */
function openJournal(){
journalPopup.style.display="block";
rows.innerHTML="";
addRow();
}

async function addRow(){
let list=[];
let snap=await db.collection("ledgers").where("company","==",company).get();
snap.forEach(d=>list.push(d.data().name));

if(list.length===0){
list=["Cash","Bank","Sales","Purchase"];
}

let options=list.map(l=>`<option>${l}</option>`).join("");

let div=document.createElement("div");
div.className="row";
div.innerHTML=`
<select>${options}</select>
<input type="number" oninput="calcTotal()" placeholder="Debit">
<input type="number" oninput="calcTotal()" placeholder="Credit">`;
rows.appendChild(div);
}

function calcTotal(){
let dr=0,cr=0;
document.querySelectorAll(".row").forEach(r=>{
dr+=+r.children[1].value||0;
cr+=+r.children[2].value||0;
});
totalDr.innerText=dr;
totalCr.innerText=cr;
}

function saveJournal(){
let list=[],dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let acc=r.children[0].value;
let d=+r.children[1].value||0;
let c=+r.children[2].value||0;

if(d){list.push({acc,type:"dr",amt:d});dr+=d;}
if(c){list.push({acc,type:"cr",amt:c});cr+=c;}
});

if(dr!==cr){alert("Not balanced");return;}

db.collection("entries").add({
company,
date:new Date().toLocaleDateString(),
narration:narration.value,
lines:list
});

journalPopup.style.display="none";
loadData();
}

/* DATA */
async function loadData(){

let ledgerMap={};
let snapLedgers=await db.collection("ledgers").where("company","==",company).get();
snapLedgers.forEach(d=>{
ledgerMap[d.data().name]=d.data().type;
});

let snap=await db.collection("entries").where("company","==",company).get();

ledger.innerHTML="";
let income=0,expense=0,asset=0,liability=0;

snap.forEach(d=>{
d.data().lines.forEach(l=>{

ledger.innerHTML+=`
<tr>
<td>${d.data().date}</td>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
<td>${d.data().narration||""}</td>
</tr>`;

let type=ledgerMap[l.acc];

if(type==="Income") income+=l.amt;
if(type==="Expense") expense+=l.amt;

if(type==="Asset"){
if(l.type==="dr") asset+=l.amt;
else asset-=l.amt;
}

if(type==="Liability"){
if(l.type==="cr") liability+=l.amt;
else liability-=l.amt;
}

});
});

plData={income,expense};
bsData={asset,liability};

}

/* PAGE */
function showPage(p){
dashboard.style.display="none";
plPage.style.display="none";
bsPage.style.display="none";

if(p==="dashboard") dashboard.style.display="block";
if(p==="pl"){plPage.style.display="block";renderPL();}
if(p==="bs"){bsPage.style.display="block";renderBS();}
}

/* P&L */
function renderPL(){
plDetails.innerHTML=`
Income: ₹ ${plData.income}<br>
Expense: ₹ ${plData.expense}<br>
<hr>Profit: ₹ ${plData.income - plData.expense}`;
}

/* BS */
function renderBS(){
bsDetails.innerHTML=`
Assets: ₹ ${bsData.asset}<br>
Liabilities: ₹ ${bsData.liability}`;
}
</script>
