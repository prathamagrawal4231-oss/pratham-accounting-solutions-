<!DOCTYPE html>
<html>
<head>
<title>Accounting Pro</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  display:flex;
  height:100vh;
  background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  background:#0f172a;
  color:white;
  padding:20px;
}

.sidebar h2 {
  margin-bottom:20px;
}

.sidebar button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover {
  background:#334155;
}

/* MAIN */
.main {
  flex:1;
  padding:25px;
  overflow:auto;
}

/* CARDS */
.cards {
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.card {
  flex:1;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h3 {
  color:#64748b;
  font-size:14px;
}

.card h2 {
  margin-top:5px;
}

/* JOURNAL BOX */
.journal-box {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input, select {
  padding:10px;
  margin:5px;
  border:1px solid #ccc;
  border-radius:8px;
}

/* BUTTONS */
.btn {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-primary {
  background:#2563eb;
  color:white;
}

.btn-danger {
  background:#dc2626;
  color:white;
}

/* TABLE */
table {
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

th, td {
  padding:12px;
  text-align:left;
}

th {
  background:#f8fafc;
}

tr:nth-child(even) {
  background:#f9fafb;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Accounting</h2>

  <button onclick="showPage('journal')">Journal</button>
  <button onclick="showPage('trial')">Trial Balance</button>
  <button onclick="showPage('pl')">Profit & Loss</button>
  <button onclick="showPage('bs')">Balance Sheet</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASH CARDS -->
<div class="cards">
  <div class="card">
    <h3>Total Entries</h3>
    <h2 id="entryCount">0</h2>
  </div>
  <div class="card">
    <h3>Total Debit</h3>
    <h2 id="totalDr">₹0</h2>
  </div>
  <div class="card">
    <h3>Total Credit</h3>
    <h2 id="totalCr">₹0</h2>
  </div>
</div>

<!-- JOURNAL -->
<div id="journalPage" class="journal-box">
  <h2>Journal Entry</h2>

  <div id="journalLines"></div>

  <button class="btn btn-primary" onclick="addLine()">+ Add Line</button>
  <button class="btn btn-primary" onclick="saveEntry()">Save</button>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Account</th>
        <th>Dr</th>
        <th>Cr</th>
      </tr>
    </thead>
    <tbody id="ledger"></tbody>
  </table>
</div>

<!-- OTHER PAGES -->
<div id="trialPage" style="display:none;"></div>
<div id="plPage" style="display:none;"></div>
<div id="bsPage" style="display:none;"></div>

</div>

<script>

let accounts = ["Cash","Bank","Sales","Expense"];
let entries = [];

function showPage(p){
  document.getElementById("journalPage").style.display = p==="journal"?"block":"none";
}

// ADD LINE
function addLine(){
  let div = document.createElement("div");

  let opts = accounts.map(a=>`<option>${a}</option>`).join("");

  div.innerHTML = `
    <select class="acc">${opts}</select>
    <select class="type">
      <option value="debit">Dr</option>
      <option value="credit">Cr</option>
    </select>
    <input type="number" class="amt">
    <button class="btn btn-danger" onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("journalLines").appendChild(div);
}

// SAVE
function saveEntry(){
  let dr=0, cr=0, lines=[];

  document.querySelectorAll("#journalLines div").forEach(div=>{
    let acc = div.querySelector(".acc").value;
    let type = div.querySelector(".type").value;
    let amt = parseFloat(div.querySelector(".amt").value||0);

    if(amt<=0) return;

    lines.push({acc,type,amt});
    if(type==="debit") dr+=amt; else cr+=amt;
  });

  if(lines.length<2 || Math.abs(dr-cr)>0.01){
    alert("Invalid entry");
    return;
  }

  entries.push({
    date:new Date().toLocaleDateString(),
    lines
  });

  document.getElementById("journalLines").innerHTML="";
  render();
}

// RENDER
function render(){
  let ledger = document.getElementById("ledger");
  ledger.innerHTML="";

  let totalDr=0, totalCr=0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      let tr=document.createElement("tr");

      if(l.type==="debit") totalDr+=l.amt;
      else totalCr+=l.amt;

      tr.innerHTML=`
        <td>${e.date}</td>
        <td>${l.acc}</td>
        <td>${l.type==="debit"?l.amt:""}</td>
        <td>${l.type==="credit"?l.amt:""}</td>
      `;

      ledger.appendChild(tr);
    });
  });

  document.getElementById("entryCount").innerText = entries.length;
  document.getElementById("totalDr").innerText = "₹"+totalDr;
  document.getElementById("totalCr").innerText = "₹"+totalCr;
}

</script>

</body>
</html>
