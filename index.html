<!DOCTYPE html>
<html>
<head>
<title>SaaS Accounting Fix</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;display:flex;height:100vh}

.auth,.company{
position:fixed;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
background:#0b1220;
}

.box{background:#111c33;padding:20px;border-radius:10px}

input{padding:8px;margin:5px}

button{padding:8px;margin:5px;cursor:pointer}

.sidebar{width:240px;background:#020617;padding:15px}
.main{flex:1;background:#f1f5f9;color:black;padding:20px;overflow:auto}

.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}

.row{display:grid;grid-template-columns:1fr 100px 1fr 100px;gap:8px;margin:5px 0}

table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#1e3a8a;color:white}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB38hscdHXDbQ3Bw6ZGLIgk8ci323KFAg4",
authDomain:"pratham-accounting-solution.firebaseapp.com",
projectId:"pratham-accounting-solution",
storageBucket:"pratham-accounting-solution.firebasestorage.app",
messagingSenderId:"261436280247",
appId:"1:261436280247:web:5af8a0f36ff722dce62c32"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let user=null;
let company=null;
let entries=[];

/* LOGIN */
function login(){
let e=email.value;
let p=password.value;

auth.signInWithEmailAndPassword(e,p)
.then(u=>init(u.user.uid))
.catch(()=>auth.createUserWithEmailAndPassword(e,p)
.then(u=>init(u.user.uid))
);
}

function init(uid){
user=uid;
authBox.style.display="none";
loadCompanies();
}

/* COMPANIES */
function loadCompanies(){
companyBox.style.display="flex";

db.collection("companies")
.where("user","==",user)
.get()
.then(s=>{
companyList.innerHTML="";
s.forEach(d=>{
companyList.innerHTML+=`
<div>
${d.data().name}
<button onclick="openCompany('${d.id}','${d.data().name}')">Open</button>
</div>`;
});
});
}

function createCompany(){
db.collection("companies").add({
name:newCompany.value,
user:user
});
newCompany.value="";
loadCompanies();
}

function openCompany(id,name){
company=name;
companyBox.style.display="none";
app.style.display="flex";
companyName.innerText=name;
loadData();
}

/* JOURNAL */
function addRow(){
let div=document.createElement("div");
div.className="row";
div.innerHTML=`
<input class="drA" placeholder="Dr">
<input class="drV" type="number">
<input class="crA" placeholder="Cr">
<input class="crV" type="number">
`;
rows.appendChild(div);
}

function saveEntry(){
let list=[];
let dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let da=r.querySelector(".drA").value;
let dv=+r.querySelector(".drV").value||0;
let ca=r.querySelector(".crA").value;
let cv=+r.querySelector(".crV").value||0;

if(dv){list.push({acc:da,type:"dr",amt:dv});dr+=dv;}
if(cv){list.push({acc:ca,type:"cr",amt:cv});cr+=cv;}
});

if(Math.abs(dr-cr)>0.01){alert("Not balanced");return;}

db.collection("entries").add({
user:user,
company:company,
lines:list,
date:new Date().toLocaleDateString()
});

rows.innerHTML="";
loadData();
}

/* LOAD */
function loadData(){
db.collection("entries")
.where("user","==",user)
.where("company","==",company)
.get()
.then(s=>{
ledger.innerHTML="";
entries=[];

let inc=0,exp=0;

s.forEach(d=>{
let e=d.data();
entries.push(e);

e.lines.forEach(l=>{
ledger.innerHTML+=`
<tr>
<td>${l.acc}</td>
<td>${l.type==="dr"?l.amt:""}</td>
<td>${l.type==="cr"?l.amt:""}</td>
</tr>`;

if(l.type==="dr") exp+=l.amt;
if(l.type==="cr") inc+=l.amt;
});
});

dash.innerHTML=
`Income ₹${inc}<br>
Expense ₹${exp}<br>
Profit ₹${inc-exp}`;
});
}
</script>
</head>

<body>

<div id="authBox" class="auth">
<div class="box">
<h2>Login</h2>
<input id="email"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<div id="companyBox" class="company" style="display:none">
<div class="box">
<h2>Companies</h2>
<input id="newCompany">
<button onclick="createCompany()">Create</button>
<div id="companyList"></div>
</div>
</div>

<div id="app" style="display:none;width:100%;display:flex">

<div class="sidebar">
<h3 id="companyName"></h3>
<button onclick="addRow()">Add Row</button>
<button onclick="saveEntry()">Save</button>
</div>

<div class="main">

<div class="card">
<h2>Dashboard</h2>
<div id="dash"></div>
</div>

<div class="card">
<h2>Journal</h2>
<div id="rows"></div>

<table>
<tr><th>Acc</th><th>Dr</th><th>Cr</th></tr>
<tbody id="ledger"></tbody>
</table>

</div>

</div>
</div>

</body>
</html>
