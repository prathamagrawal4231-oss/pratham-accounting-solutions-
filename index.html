<!DOCTYPE html>
<html>
<head>
<title>Pratham Accounting Pro</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }

/* Sidebar */
.sidebar {
  width:220px;
  background:#0f172a;
  color:white;
  padding:20px;
}

.sidebar button {
  width:100%;
  padding:8px;
  margin-top:10px;
  background:#1e293b;
  color:white;
  border:none;
  cursor:pointer;
}

/* Main */
.main {
  flex:1;
  padding:20px;
  background:#f1f5f9;
}

input, select { padding:8px; margin:5px; }
button { padding:8px 12px; margin:5px; }

/* Table */
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:10px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Accounts</h3>
  <div id="accountList"></div>
  <button onclick="addAccount()">+ Add Account</button>

  <hr>

  <button onclick="showPage('journal')">Journal</button>
  <button onclick="showPage('trial')">Trial Balance</button>
  <button onclick="showPage('pl')">Profit & Loss</button>
  <button onclick="showPage('bs')">Balance Sheet</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- JOURNAL -->
<div id="journalPage">
<h2>Journal Entry</h2>

<div id="journalLines"></div>

<button onclick="addLine()">+ Add Line</button>
<button onclick="saveEntry()">Save Entry</button>

<h2>Ledger</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Account</th>
<th>Dr</th>
<th>Cr</th>
</tr>
</thead>
<tbody id="ledger"></tbody>
</table>
</div>

<!-- TRIAL BALANCE -->
<div id="trialPage" style="display:none;">
<h2>Trial Balance</h2>

<table>
<thead>
<tr>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
</tr>
</thead>
<tbody id="trial"></tbody>
</table>

<h3 id="totals"></h3>
</div>

<!-- PROFIT & LOSS -->
<div id="plPage" style="display:none;">
<h2>Profit & Loss</h2>
<div id="plContent"></div>
</div>

<!-- BALANCE SHEET -->
<div id="bsPage" style="display:none;">
<h2>Balance Sheet</h2>
<div id="bsContent"></div>
</div>

</div>

<script>

// ===== DATA =====
let accounts = ["Cash","Bank","Sales","Expense"];
let entries = [];

// ===== NAVIGATION =====
function showPage(page){
  document.getElementById("journalPage").style.display = page==="journal"?"block":"none";
  document.getElementById("trialPage").style.display = page==="trial"?"block":"none";
  document.getElementById("plPage").style.display = page==="pl"?"block":"none";
  document.getElementById("bsPage").style.display = page==="bs"?"block":"none";

  if(page==="trial") renderTrial();
  if(page==="pl") renderPL();
  if(page==="bs") renderBS();
}

// ===== ACCOUNTS =====
function renderAccounts(){
  let list = document.getElementById("accountList");
  list.innerHTML="";
  accounts.forEach(a=>{
    let d=document.createElement("div");
    d.innerText=a;
    list.appendChild(d);
  });
}

function addAccount(){
  let name = prompt("Account name:");
  if(!name) return;
  accounts.push(name);
  renderAccounts();
}

// ===== JOURNAL =====
function addLine(){

  let div=document.createElement("div");

  let opts = accounts.map(a=>`<option>${a}</option>`).join("");

  div.innerHTML=`
    <select class="acc">${opts}</select>
    <select class="type">
      <option value="debit">Dr</option>
      <option value="credit">Cr</option>
    </select>
    <input type="number" class="amt">
    <button onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("journalLines").appendChild(div);
}

function saveEntry(){

  let dr=0, cr=0;
  let lines=[];

  document.querySelectorAll("#journalLines div").forEach(div=>{
    let acc = div.querySelector(".acc").value;
    let type = div.querySelector(".type").value;
    let amt = parseFloat(div.querySelector(".amt").value||0);

    if(amt<=0) return;

    lines.push({acc,type,amt});

    if(type==="debit") dr+=amt;
    else cr+=amt;
  });

  if(lines.length<2){
    alert("Add at least 2 lines");
    return;
  }

  if(Math.abs(dr-cr)>0.01){
    alert("Entry not balanced");
    return;
  }

  entries.push({
    date:new Date().toLocaleDateString(),
    lines
  });

  document.getElementById("journalLines").innerHTML="";
  renderLedger();
}

// ===== LEDGER =====
function renderLedger(){

  let ledger = document.getElementById("ledger");
  ledger.innerHTML="";

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      let tr=document.createElement("tr");

      tr.innerHTML=`
        <td>${e.date}</td>
        <td>${l.acc}</td>
        <td>${l.type==="debit"?l.amt:""}</td>
        <td>${l.type==="credit"?l.amt:""}</td>
      `;

      ledger.appendChild(tr);
    });
  });
}

// ===== TRIAL BALANCE =====
function renderTrial(){

  let trial = document.getElementById("trial");
  trial.innerHTML="";

  let balances = {};

  accounts.forEach(a=>{
    balances[a]={dr:0,cr:0};
  });

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.type==="debit") balances[l.acc].dr+=l.amt;
      else balances[l.acc].cr+=l.amt;
    });
  });

  let totalDr=0, totalCr=0;

  for(let acc in balances){

    let dr = balances[acc].dr;
    let cr = balances[acc].cr;

    if(dr===0 && cr===0) continue;

    let tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${acc}</td>
      <td>${dr.toFixed(2)}</td>
      <td>${cr.toFixed(2)}</td>
    `;

    trial.appendChild(tr);

    totalDr+=dr;
    totalCr+=cr;
  }

  document.getElementById("totals").innerText =
    "Total Dr: ₹"+totalDr.toFixed(2)+" | Total Cr: ₹"+totalCr.toFixed(2);
}

// ===== PROFIT & LOSS =====
function renderPL(){

  let income = 0;
  let expense = 0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{
      if(l.acc.toLowerCase().includes("sales")) income += l.amt;
      if(l.acc.toLowerCase().includes("expense")) expense += l.amt;
    });
  });

  let profit = income - expense;

  document.getElementById("plContent").innerHTML = `
    <p><b>Total Income:</b> ₹${income.toFixed(2)}</p>
    <p><b>Total Expense:</b> ₹${expense.toFixed(2)}</p>
    <h3>${profit >= 0 ? "Profit" : "Loss"}: ₹${profit.toFixed(2)}</h3>
  `;
}

// ===== BALANCE SHEET =====
function renderBS(){

  let assets = 0;
  let liabilities = 0;

  entries.forEach(e=>{
    e.lines.forEach(l=>{

      let name = l.acc.toLowerCase();

      if(name.includes("cash") || name.includes("bank")){
        if(l.type==="debit") assets += l.amt;
        else assets -= l.amt;
      }
      else {
        if(l.type==="credit") liabilities += l.amt;
        else liabilities -= l.amt;
      }

    });
  });

  document.getElementById("bsContent").innerHTML = `
    <p><b>Assets:</b> ₹${assets.toFixed(2)}</p>
    <p><b>Liabilities:</b> ₹${liabilities.toFixed(2)}</p>
  `;
}

// INIT
renderAccounts();

</script>

</body>
</html>
