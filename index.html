<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratham Accounting Pro</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }

.sidebar {
  width:220px;
  background:#0f172a;
  color:white;
  padding:20px;
}

.sidebar h2 { margin-bottom:20px; }

.sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
  background:#f1f5f9;
}

input, select {
  padding:8px;
  margin:5px;
}

button.action {
  padding:8px 12px;
  margin:5px;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:20px;
}

th, td {
  border:1px solid #ccc;
  padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Accounts</h2>
  <div id="accountList"></div>
  <button onclick="addAccount()">+ Add Account</button>
</div>

<div class="main">

<h2>Journal Entry</h2>

<div id="journalLines"></div>
<button onclick="addLine()">+ Add Line</button>
<button class="action" onclick="saveEntry()">Save Entry</button>

<h2>Ledger</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Account</th>
<th>Dr</th>
<th>Cr</th>
</tr>
</thead>
<tbody id="ledger"></tbody>
</table>

</div>

<script>

// ===== DATA =====
let accounts = ["Cash", "Bank", "Sales"];
let entries = [];

// ===== ELEMENTS =====
const accountList = document.getElementById("accountList");
const journalLines = document.getElementById("journalLines");
const ledger = document.getElementById("ledger");

// ===== LOAD ACCOUNTS =====
function renderAccounts() {
  accountList.innerHTML = "";
  accounts.forEach(acc => {
    const div = document.createElement("div");
    div.innerText = acc;
    accountList.appendChild(div);
  });
}

// ===== ADD ACCOUNT =====
function addAccount() {
  const name = prompt("Enter account name:");
  if (!name) return;
  accounts.push(name);
  renderAccounts();
}

// ===== ADD JOURNAL LINE =====
function addLine() {

  const div = document.createElement("div");

  let options = accounts.map(a => `<option>${a}</option>`).join("");

  div.innerHTML = `
    <select class="account">${options}</select>
    <select class="type">
      <option value="debit">Dr</option>
      <option value="credit">Cr</option>
    </select>
    <input type="number" class="amt" placeholder="Amount">
    <button onclick="this.parentElement.remove()">X</button>
  `;

  journalLines.appendChild(div);
}

// ===== SAVE ENTRY =====
function saveEntry() {

  let lines = [];
  let dr = 0;
  let cr = 0;

  document.querySelectorAll("#journalLines div").forEach(div => {
    const acc = div.querySelector(".account").value;
    const type = div.querySelector(".type").value;
    const amt = parseFloat(div.querySelector(".amt").value || 0);

    if (amt <= 0) return;

    lines.push({ acc, type, amt });

    if (type === "debit") dr += amt;
    else cr += amt;
  });

  if (lines.length < 2) {
    alert("Minimum 2 lines required");
    return;
  }

  if (Math.abs(dr - cr) > 0.01) {
    alert("Entry not balanced!");
    return;
  }

  entries.push({
    date: new Date().toLocaleDateString(),
    lines
  });

  journalLines.innerHTML = "";
  renderLedger();
}

// ===== LEDGER =====
function renderLedger() {

  ledger.innerHTML = "";

  entries.forEach(e => {

    e.lines.forEach(l => {

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${e.date}</td>
        <td>${l.acc}</td>
        <td>${l.type === "debit" ? l.amt : ""}</td>
        <td>${l.type === "credit" ? l.amt : ""}</td>
      `;

      ledger.appendChild(row);
    });

  });
}

// INIT
renderAccounts();

</script>

</body>
</html>
